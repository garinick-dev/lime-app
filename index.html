    function initLimeExtras(){const bM=document.getElementById('lime-body-main'),eM=document.querySelectorAll('.lime-eye'),eG=document.getElementById('lime-eyes-group');let isT=false,eTo,fTo,aObs=null,sPD=false,tsTo=null;window.updateGreetingVisibility=()=>{if(!DOM.greetingBox)return;const mc=DOM.chatBox?DOM.chatBox.querySelectorAll('.msg-wrapper').length:0,hT=DOM.inputField?DOM.inputField.value.trim().length>0:false;if(mc===0&&!hT&&!currentConversationId)DOM.greetingBox.classList.remove('hidden-greeting');else DOM.greetingBox.classList.add('hidden-greeting');};const sT=(c)=>{if(!DOM.inputField)return;DOM.inputField.value=c;DOM.inputField.dispatchEvent(new Event('input',{bubbles:true}));const ev=new KeyboardEvent('keydown',{bubbles:true,cancelable:true,key:'Enter',code:'Enter'});DOM.inputField.dispatchEvent(ev);};window.setMascotThinking=(st)=>{isT=st;if(st){sPD=true;eM.forEach(e=>e.classList.add('eyes-closed'));clearTimeout(eTo);clearTimeout(fTo);clearTimeout(tsTo);if(eG)eG.classList.remove('show-stars','show-x');if(aObs){aObs.disconnect();aObs=null;}}else{if(!sPD){eM.forEach(e=>e.classList.remove('eyes-closed'));return;}sPD=false;tsTo=setTimeout(()=>{const bMs=document.querySelectorAll('.bot-msg');if(bMs.length===0){eM.forEach(e=>e.classList.remove('eyes-closed'));return;}const lM=bMs[bMs.length-1];const cT=()=>{const t=lM.innerText.toLowerCase().substring(0,80);if(t.length<2)return false;let fE=null;if(/\b(sbagliato|errato|no|non|errore|purtroppo)\b/.test(t))fE='show-x';else if(/\b(esatto|giusto|corretto|ottimo|perfetto|bravo|sì|si|eccellente|certamente)\b/.test(t))fE='show-stars';if(fE&&eG){eG.classList.add(fE);eTo=setTimeout(()=>eG.classList.remove(fE),1500);if(aObs){aObs.disconnect();aObs=null;}return true;}return false;};if(!cT()){aObs=new MutationObserver(cT);aObs.observe(lM,{childList:true,subtree:true,characterData:true});fTo=setTimeout(()=>{if(aObs){aObs.disconnect();aObs=null;}},8000);}eM.forEach(e=>e.classList.remove('eyes-closed'));},50);}};if(DOM.chat     function setupViewportAnchoring(){const mS=document.querySelector('#lime-app-mascot svg');let lMP=-1,lW=window.innerWidth,lH=window.innerHeight;function lD(){document.body.style.height=lH+'px';document.documentElement.style.height=lH+'px';}lD();window.syncAnchoring=()=>{const bA=document.getElementById('breath-area');if(bA){const bR=bA.getBoundingClientRect(),vH=window.visualViewport?window.visualViewport.height:window.innerHeight,rP=Math.max(0,vH-bR.top);document.documentElement.style.setProperty('--breath-padding',rP+'px');}if(DOM.chatBox){const tY=mS?(mS.getBoundingClientRect().top+(mS.getBoundingClientRect().height/2)):lH/2,bR=DOM.chatBox.getBoundingClientRect(),rP=Math.max(0,bR.bottom-tY);if(Math.abs(rP-lMP)>1)lMP=rP;}};window.syncAnchoring();window.addEventListener('resize',()=>{if(window.innerWidth!==lW){lW=window.innerWidth;lH=window.innerHeight;lD();}window.syncAnchoring();},{passive:true});if(window.visualViewport){function tK(){const vH=window.visualViewport.height,vO=window.visualViewport.offsetTop,kH=Math.max(0,lH-(vH+vO)),sY=`translateY(-${kH}px)`;if(DOM.inputArea)DOM.inputArea.style.transform=`${sY} translateZ(0)`;if(DOM.chatBox)DOM.chatBox.style.transform=sY;if(DOM.greetingBox)DOM.greetingBox.style.transform=sY;window.scrollTo(0,0);window.syncAnchoring();}window.visualViewport.addEventListener('resize',tK,{passive:true});window.visualViewport.addEventListener('scroll',tK,{passive:true});}window.scrollToBottom=(f=false)=>{if(DOM.chatBox&&(!window.isUserScrolling||f))DOM.chatBox.scrollTop=DOM.chatBox.scrollHeight;};if(DOM.chatBox)new MutationObserver((m)=>{let sS=false;m.forEach(x=>{if(x.addedNodes.length>0)sS=true;});if(sS)requestAnimationFrame(()=>{window.syncAnchoring();if(window.scrollToBottom)window.scrollToBottom(true);});}).observe(DOM.chatBox,{childList:true});}
    function setupMathAndSanitization(){if(!window.marked||!window.DOMPurify)return;if(window.marked&&window.markedKatex)marked.use(window.markedKatex({throwOnError:false}),{breaks:true,gfm:true});const oS=window.DOMPurify.sanitize;window.DOMPurify.sanitize=function(c,cfg){return oS.call(window.DOMPurify,c,Object.assign({},cfg||{},{ADD_TAGS:['math','annotation','semantics','mrow','mi','mo','mn','msup','msub','msubsup','mfrac','msqrt','mroot','mtable','mtr','mtd','mspace','mtext','path','line','svg','g','think'],ADD_ATTR:['xmlns','display','aria-hidden','style','class','d','viewBox','preserveAspectRatio','x','y','width','height']}));};function sT(el,sb){const t=sb.querySelector('.math-thumb');if(!t)return;const sW=el.scrollWidth-el.clientWidth;if(sW<=0)return;const sR=el.scrollLeft/sW,tP=Math.max(15,(el.clientWidth/el.scrollWidth)*100);t.style.width=tP+'%';t.style.left=`calc(${sR} * (100% - ${tP}%))`;}const rO=new ResizeObserver(ents=>{for(let e of ents){const el=e.target;let sb=el.nextElementSibling;if(!sb||!sb.classList.contains('math-scrollbar')){sb=document.createElement('div');sb.className='math-scrollbar';sb.innerHTML=`<div class="math-arrow left"></div><div class="math-track"><div class="math-thumb"></div></div><div class="math-arrow right"></div>`;el.insertAdjacentElement('afterend',sb);el.addEventListener('scroll',()=>sT(el,sb),{passive:true});}const iO=el.scrollWidth>el.clientWidth+2;sb.style.display=iO?'flex':'none';if(iO)sT(el,sb);}});const mO=new MutationObserver((ms)=>{ms.forEach((m)=>{m.addedNodes.forEach((n)=>{if(n.nodeType===1){if(n.classList.contains('katex-display'))rO.observe(n);const mBs=n.querySelectorAll?n.querySelectorAll('.katex-display'):[];mBs.forEach(b=>rO.observe(b));}});});});if(DOM.chatBox)mO.observe(DOM.chatBox,{childList:true,subtree:true});}
