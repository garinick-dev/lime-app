    function toggleAuthMode() { authMode = authMode === 'login' ? 'signup' : 'login'; document.getElementById('signup-extra').classList.toggle('hidden'); document.getElementById('auth-btn').innerText = authMode === 'login' ? 'Accedi' : 'Registrati'; document.getElementById('auth-toggle-text').innerText = authMode === 'login' ? 'Nuovo utente? Registrati' : 'Hai già un account? Accedi'; }
    async function handleAuth() { const u = document.getElementById('username').value.trim().toLowerCase(), p = document.getElementById('password').value; if (!u || !p) return alert("Inserisci username e password"); if (authMode === 'signup' && p !== document.getElementById('confirm-password').value) return alert("Le password non coincidono"); const email = `${u}@lime.local`; if (authMode === 'signup') { const { error } = await supabaseClient.auth.signUp({ email, password: p }); if (error) return alert("Errore: " + error.message); alert("Account creato!"); toggleAuthMode(); } else { const { error } = await supabaseClient.auth.signInWithPassword({ email, password: p }); if (error) return alert("Credenziali errate"); } }

    async function loadHistory() { const { data } = await supabaseClient.from('conversations').select('*').order('created_at', { ascending: false }); allChats = data || []; chatPage = 1; renderHistoryList(); }
    function handleChatClick(id) { if (currentConversationId === id && !isGenerating) return; isGenerating = false; if (window.setMascotThinking) window.setMascotThinking(false); DOM.sendBtn.disabled = false; document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active-chat')); const clickedItem = document.getElementById(`chat-${id}`); if (clickedItem) clickedItem.classList.add('active-chat'); loadChat(id); }
    
    function renderHistoryList() { DOM.historyList.innerHTML = ""; const fragment = document.createDocumentFragment(); const toShow = allChats.slice(0, chatPage * CHATS_PER_PAGE); toShow.forEach(chat => { const div = document.createElement('div'); div.className = `history-item ${chat.dify_id === currentConversationId ? 'active-chat' : ''}`; div.id = `chat-${chat.dify_id}`; div.onclick = () => handleChatClick(chat.dify_id); const safeTitle = DOMPurify.sanitize(chat.title || "Nuova conversazione", { ALLOWED_TAGS: [] }); div.innerHTML = `<div class="chat-title">${safeTitle}</div><div class="chat-actions"><button class="action-btn" onclick="event.stopPropagation(); renameChat('${chat.dify_id}', '${chat.title}')">${svgEdit}</button><button class="action-btn" style="color:#ff4444" onclick="event.stopPropagation(); deleteChat('${chat.dify_id}')">${svgDelete}</button></div>`; fragment.appendChild(div); }); if (allChats.length > chatPage * CHATS_PER_PAGE) { const btn = document.createElement('button'); btn.className = "load-more-btn"; btn.innerText = "Carica chat precedenti"; btn.onclick = () => { chatPage++; renderHistoryList(); }; fragment.appendChild(btn); } DOM.historyList.appendChild(fragment); }

    async function deleteChat(id) { if (confirm("Vuoi eliminare questa chat?")) { await supabaseClient.from('conversations').delete().eq('dify_id', id); delete chatCache[id]; if (currentConversationId === id) startNewChat(); else loadHistory(); } }
    function startNewChat() { isGenerating = false; if (window.setMascotThinking) window.setMascotThinking(false); DOM.sendBtn.disabled = false; currentConversationId = null; DOM.chatBox.innerHTML = ""; if (window.setGreetingVisible) window.setGreetingVisible(true); document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active-chat')); if (window.innerWidth < 768 && !DOM.sidebar.classList.contains('hidden')) toggleSidebar(); }

    async function loadChat(id) { currentConversationId = id; if (window.innerWidth < 768 && !DOM.sidebar.classList.contains('hidden')) toggleSidebar(); if (chatCache[id]) { renderMessages(chatCache[id]); return; } DOM.chatBox.innerHTML = `<div style="color:var(--text-muted); text-align:center; width:100%; margin-top:20px;">Recupero messaggi...</div>`; const controller = new AbortController(); const timeoutId = setTimeout(() => controller.abort(), 10000); try { const res = await fetch(`${EDGE_FUNCTION_URL}?path=/messages&conversation_id=${id}&user=${userId}`, { headers: await getAuthHeaders(), signal: controller.signal }); clearTimeout(timeoutId); const result = await res.json(); if (result.data && result.data.length > 0) { const sorted = result.data.sort((a, b) => a.created_at - b.created_at); chatCache[id] = sorted; renderMessages(sorted); } else startNewChat(); } catch (e) { clearTimeout(timeoutId); DOM.chatBox.innerHTML = `<div style="color:#ff4444; text-align:center; width:100%;">Impossibile recuperare la chat. Riprova.</div>`; } }
    function renderMessages(messages) { DOM.chatBox.innerHTML = ""; const fragment = document.createDocumentFragment(); let lastDate = null; messages.forEach(m => { const md = formatDateSeparator(m.created_at); if (md !== lastDate) { fragment.appendChild(createDateSeparatorNode(md)); lastDate = md; } let rawQuery = m.query || "", fileName = "Allegato", fileMatch = rawQuery.match(/\[--- FILE: (.*?) ---\]\n?/); if (fileMatch) { fileName = fileMatch[1]; rawQuery = rawQuery.replace(fileMatch[0], ""); } const docRegex = /\[--- INIZIO DOC ---\][\s\S]*?\[--- FINE DOC ---\]\n?/g; let hasFile = docRegex.test(rawQuery) || fileMatch || (m.message_files && m.message_files.length > 0); let userHtml = rawQuery.replace(docRegex, "").trim().replace(/[&<>'"]/g, t => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[t] || t)); if (hasFile) userHtml = `<div style="font-size:0.85em; opacity:0.8; margin-bottom:5px;">📎 ${fileName}</div>` + userHtml; fragment.appendChild(createMessageNode('user', userHtml, m.created_at, true)); fragment.appendChild(createMessageNode('bot', m.answer, m.created_at)); }); DOM.chatBox.appendChild(fragment); scrollToBottom(true); }

    window.handleFileSelect = function(e) { const file = e.target.files[0]; if (!file) { clearAttachment(); return; } currentFile = file; const btn = document.getElementById('attach-btn'); btn.classList.add('active'); btn.innerHTML = `${svgAttach}<div class="del-badge">${svgCross}</div>`; btn.onclick = clearAttachment; const label = document.getElementById('attachment-label'); label.innerText = file.name; label.style.display = 'block'; };

    async function extractTextFromFile(file) { if (file.type === 'text/plain') return await file.text(); if (file.type === 'application/pdf' && window.pdfjsLib) { const arrayBuffer = await file.arrayBuffer(), pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise; let text = ""; for (let i = 1; i <= pdf.numPages; i++) { const page = await pdf.getPage(i), content = await page.getTextContent(); text += content.items.map(item => item.str).join(' ') + "\\n"; } return text; } return ""; }
    async function encodeToWAV(audioBlob) { const audioContext = new (window.AudioContext || window.webkitAudioContext)(); const arrayBuffer = await audioBlob.arrayBuffer(), audioBuffer = await audioContext.decodeAudioData(arrayBuffer); const sampleRate = audioBuffer.sampleRate, resultBuffer = audioBuffer.getChannelData(0); const buffer = new ArrayBuffer(44 + resultBuffer.length * 2), view = new DataView(buffer); const writeString = (view, offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); }; writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + resultBuffer.length * 2, true); writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeString(view, 36, 'data'); view.setUint32(40, resultBuffer.length * 2, true); let offset = 44; for (let i = 0; i < resultBuffer.length; i++) { let s = Math.max(-1, Math.min(1, resultBuffer[i])); view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true); offset += 2; } return new Blob([buffer], { type: 'audio/wav' }); }
    
    async function toggleRecording() { const micBtn = document.getElementById('mic-btn'), timerDisplay = document.getElementById('recording-timer'); if (isRecording) { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); return; } try { if (!globalStream) globalStream = await navigator.mediaDevices.getUserMedia({ audio: true }); globalStream.getAudioTracks().forEach(t => t.enabled = true); mediaRecorder = new MediaRecorder(globalStream); audioChunks = []; mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); }; mediaRecorder.onstop = async () => { isRecording = false; clearInterval(recordingTimer); globalStream.getAudioTracks().forEach(t => t.enabled = false); timerDisplay.classList.add('hidden'); micBtn.classList.add('hidden'); DOM.sendBtn.innerHTML = svgSendPlane; DOM.sendBtn.style.background = 'var(--accent)'; DOM.sendBtn.disabled = true; if (audioChunks.length > 0) { DOM.inputField.style.color = 'var(--accent)'; DOM.inputField.value = "Conversione in corso..."; if (window.setMascotThinking) window.setMascotThinking(true); try { const rawBlob = new Blob(audioChunks); const wavBlob = await encodeToWAV(rawBlob); await sendWavToDify(new File([wavBlob], 'audio.wav', { type: 'audio/wav' })); } catch (e) { alert("Errore conversione."); resetInputUI(); } } else resetInputUI(); }; mediaRecorder.start(); isRecording = true; document.getElementById('attach-btn').classList.add('hidden'); micBtn.classList.add('hidden'); timerDisplay.classList.remove('hidden'); DOM.inputField.disabled = true; DOM.inputField.style.color = 'var(--text-muted)'; DOM.inputField.placeholder = "In ascolto..."; DOM.inputField.value = ""; recordingSeconds = 0; timerDisplay.innerText = `🔴 00:00`; recordingTimer = setInterval(() => { recordingSeconds++; timerDisplay.innerText = `🔴 ${String(Math.floor(recordingSeconds / 60)).padStart(2, '0')}:${String(recordingSeconds % 60).padStart(2, '0')}`; }, 1000); DOM.sendBtn.innerText = '■'; DOM.sendBtn.sty     async function sendWavToDify(audioFile) { const formData = new FormData(); formData.append('file', audioFile); formData.append('user', userId); try { const res = await fetch(`${EDGE_FUNCTION_URL}?path=/audio-to-text`, { method: 'POST', headers: await getAuthHeaders(), body: formData }); const data = await res.json(); if (res.ok && data.text) { DOM.inputField.style.color = 'inherit'; DOM.inputField.value = data.text; resetInputUI(false); DOM.sendBtn.disabled = false; sendMessage(); } else { resetInputUI(); } } catch (e) { resetInputUI(); } }

    async function sendMessage() {
        if (isRecording) { toggleRecording(); return; } if (isGenerating) return;
        let query = DOM.inputField.value.trim(); if ((!query && !currentFile) || query.startsWith('🔴')) return;
        isGenerating = true; if (window.setGreetingVisible) window.setGreetingVisible(false); if (window.setMascotThinking) window.setMascotThinking(true); DOM.sendBtn.disabled = true; 
        const exs = DOM.chatBox.querySelectorAll('.date-separator-text'); if (exs.length === 0 || exs[exs.length - 1].innerText !== "Oggi") DOM.chatBox.appendChild(createDateSeparatorNode("Oggi"));

        let filePayload = [], extractedText = null, isImage = false; 
        let displayHtml = query.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));

        if (currentFile) { document.getElementById('attachment-label').innerText = "Elaborazione..."; try { if (currentFile.type.startsWith('image/')) { isImage = true; const formData = new FormData(); formData.append('file', currentFile); formData.append('user', userId); const uploadRes = await fetch(`${EDGE_FUNCTION_URL}?path=/files/upload`, { method: 'POST', headers: await getAuthHeaders(), body: formData }); filePayload.push({ type: 'image', transfer_method: 'local_file', upload_file_id: (await uploadRes.json()).id }); } else extractedText = await extractTextFromFile(currentFile); displayHtml = `<div style="font-size:0.85em; opacity:0.8; margin-bottom:5px;">📎 ${currentFile.name}</div>${displayHtml}`; } catch (e) { alert("Errore file"); isGenerating = false; DOM.sendBtn.disabled = false; if (window.setMascotThinking) window.setMascotThinking(false); clearAttachment(); return; } }

        let finalQuery = query || " ", hiddenFileTag = currentFile ? `[--- FILE: ${currentFile.name} ---]\n` : '';
        if (extractedText) finalQuery = `${hiddenFileTag}${INJECT_START}\n${extractedText}\n${INJECT_END}\n${finalQuery}`; else if (currentFile) finalQuery = `${hiddenFileTag}${finalQuery}`;

        DOM.chatBox.appendChild(createMessageNode('user', displayHtml, null, true)); scrollToBottom(true); DOM.inputField.value = ""; clearAttachment(); DOM.inputField.focus(); 

        const botWrapper = createMessageNode('bot', "...", null); const botDiv = botWrapper.querySelector('.bot-msg'); DOM.chatBox.appendChild(botWrapper); let fullAnswer = "", renderQueued = false;
        let isThinkingLocal = true;

        try {
            const reqMode = isImage ? "blocking" : "streaming"; const reqBody = { inputs: {}, query: finalQuery, user: userId, response_mode: reqMode, conversation_id: currentConversationId }; if (filePayload.length > 0) Object.assign(reqBody, { files: filePayload });
            const authHeaders = await getAuthHeaders(); const res = await fetch(`${EDGE_FUNCTION_URL}?path=/chat-messages`, { method: 'POST', headers: { ...authHeaders, 'Content-Type': 'application/json' }, body: JSON.stringify(reqBody) });

            if (reqMode === "blocking") { 
                if (window.setMascotThinking) window.setMascotThinking(false); 
                const data = await res.json(); fullAnswer = data.answer || ""; 
                const bottomBar = botDiv.querySelector('.msg-bottom-bar'); 
                let safeMathText = fullAnswer.replace(/\\\[/g, '$$$$').replace(/\\\]/g, '$$$$').replace(/\\\(/g, '$').replace(/\\\)/g, '$');
                botDiv.innerHTML = window.marked ? DOMPurify.sanitize(marked.parse(safeMathText)) : DOMPurify.sanitize(safeMathText); 
                botDiv.querySelectorAll('pre').forEach(pre => pre.insertAdjacentHTML('beforeend', '<button class="copy-btn">Copia</button>')); 
                if(bottomBar) botDiv.appendChild(bottomBar); scrollToBottom(); 
                if (!currentConversationId && data.conversation_id) { currentConversationId = data.conversation_id; await supabaseClient.from('conversations').insert([{ user_id: userId, dify_id: currentConversationId, title: query.substring(0, 35) || "Nuova Chat" }]); loadHistory(); } 
                if(!chatCache[currentConversationId]) chatCache[currentConversationId] = []; chatCache[currentConversationId].push({query: finalQuery, answer: fullAnswer, created_at: Math.floor(Date.now()/1000)}); 
            } else {

                                    if (!renderQueued) {

                                            let safeMathText = fullAnswer.replace(/\\\[/g, '$$$$').replace(/\\\]/g, '$$$$').replace(/\\\(/g, '$').replace(/\\\)/g, '$');
                                            botDiv.innerHTML = window.marked ? DOMPurify.sanitize(marked.parse(safeMathText)) : DOMPurify.sanitize(safeMathText);

    async function uploadToSupabaseStorage(file, pathPrefix) { const fileExt = file.name.split('.').pop(); const fileName = `${pathPrefix}_${Date.now()}.${fileExt}`; const { data, error } = await supabaseClient.storage.from('lime-assets').upload(fileName, file, { upsert: true }); if (error) { alert("Errore caricamento immagine."); return null; } const { data: { publicUrl } } = supabaseClient.storage.from('lime-assets').getPublicUrl(fileName); return publicUrl; }

    function initLimeExtras() {

        if(DOM.chatBox && DOM.chatBox.innerHTML.trim() === "") window.setGreetingVisible(true);
        const sendTrigger = (code) => { if (!DOM.inputField) return; DOM.inputField.value = code; DOM.inputField.dispatchEvent(new Event('input', { bubbles: true })); const e = { bubbles: true, cancelable: true, key: 'Enter', code: 'Enter', keyCode: 13, which: 13 }; DOM.inputField.dispatchEvent(new KeyboardEvent('keydown', e)); DOM.inputField.dispatchEvent(new KeyboardEvent('keypress', e)); DOM.inputField.dispatchEvent(new KeyboardEvent('keyup', e)); };
        window.setMascotThinking = (state) => { isThinking = state; eyesM.forEach(e => state ? e.classList.add('eyes-closed') : e.classList.remove('eyes-closed')); };
        
        function syncFloatingUI() { if (!DOM.chatBox) return; const rect = DOM.chatBox.getBoundingClientRect(); if (DOM.greetingBox) { DOM.greetingBox.style.width = rect.width + "px"; DOM.greetingBox.style.left = rect.left + "px"; } }
        syncFloatingUI(); const resizeObserver = new ResizeObserver(() => requestAnimationFrame(syncFloatingUI)); resizeObserver.observe(document.body); if (DOM.inputArea) resizeObserver.observe(DOM.inputArea);
        if (DOM.chatBox) { new MutationObserver((mutations) => { mutations.forEach((mutation) => { if (mutation.addedNodes.length > 0) { mutation.addedNodes.forEach((node) => { if (node.nodeType === 1) { const t = node.innerText || ""; if (t.includes('@1') || t.includes('@2') || t.includes('@3') || t.includes('@4')) node.classList.add('ghost-hidden'); } }); } }); }).observe(DOM.chatBox, { childList: true, subtree: true }); }
        
        function playBlink() { if (document.hidden) return setTimeout(playBlink, 2000); if (!isThinking) { eyesM.forEach(e => e.classList.add('anim-blink')); setTimeout(() => eyesM.forEach(e => e.classList.remove('anim-blink')), 150); } setTimeout(playBlink, Math.random() * 5000 + 2000); }
        function look() { if (document.hidden) return setTimeout(look, 2000); if (isThinking) return setTimeout(look, 1000); const dirs = [{x:0,y:0},{x:0,y:-4},{x:0,y:4},{x:4,y:0},{x:-4,y:0},{x:3,y:-3},{x:-3,y:-3},{x:3,y:3},{x:-3,y:3}]; const d = dirs[Math.floor(Math.random() * dirs.length)]; eyesM.forEach(e => { e.style.setProperty('--lx', d.x+'px'); e.style.setProperty('--ly', d.y+'px'); e.style.transform = `translate(${d.x}px, ${d.y}px)`; }); setTimeout(look, Math.random() * 3000 + 2000); }
        setTimeout(playBlink, 1500); setTimeout(look, 3000);

    function initLayoutAndAnchoring() {
        let lastMsgPadding = -1, lockedWidth = window.innerWidth, lockedHeight = window.innerHeight;
        function lockDimensions() { document.body.style.height = lockedHeight + 'px'; document.documentElement.style.height = lockedHeight + 'px'; }
        lockDimensions();

        function syncAnchoring() {
            const breathArea = document.getElementById('breath-area');
            if (breathArea) {
                const breathRect = breathArea.getBoundingClientRect();
                const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                document.documentElement.style.setProperty('--breath-padding', Math.max(0, viewportHeight - breathRect.top) + 'px');
            }
        }
        syncAnchoring();

        window.addEventListener('resize', () => { if (window.innerWidth !== lockedWidth) { lockedWidth = window.innerWidth; lockedHeight = window.innerHeight; lockDimensions(); } requestAnimationFrame(syncAnchoring); }, { passive: true });
        if (window.visualViewport) {
            function trickKeyboard() {
                const vvHeight = window.visualViewport.height, vvOffset = window.visualViewport.offsetTop, keyboardHeight = Math.max(0, lockedHeight - (vvHeight + vvOffset));
                const shiftY = `translateY(-${keyboardHeight}px)`;
                if (DOM.inputArea) DOM.inputArea.style.transform = `${shiftY} translateZ(0)`;
                if (DOM.greetingBox) DOM.greetingBox.style.transform = shiftY;
                if (DOM.chatBox) DOM.chatBox.style.transform = shiftY;
                window.scrollTo(0, 0); syncAnchoring(); 
            }
            window.visualViewport.addEventListener('resize', trickKeyboard, { passive: true }); window.visualViewport.addEventListener('scroll', trickKeyboard, { passive: true });
        }
        window.scrollToBottom = function(force = false) { if (DOM.chatBox && (!window.isUserScrolling || force)) DOM.chatBox.scrollTop = DOM.chatBox.scrollHeight; };
        
        if (DOM.chatBox) {
            new MutationObserver((mutations) => {
                if (mutations.some(m => m.addedNodes.length > 0)) {
                    requestAnimationFrame(() => { syncAnchoring(); if (window.scrollToBottom) window.scrollToBottom(true); });
                }
            }).observe(DOM.chatBox, { childList: true });
        }
    }

            if (!error && user) { if (window.updateProfileUI) window.updateProfileUI(user); await supabaseClient.auth.refreshSession(); }
        }

        DOM.chatBox = document.getElementById('chat-box'); DOM.inputField = document.getElementById('user-input'); DOM.sendBtn = document.getElementById('send-btn'); DOM.sidebar = document.getElementById('sidebar'); DOM.backdrop = document.getElementById('sidebar-backdrop'); DOM.historyList = document.getElementById('history-list'); DOM.greetingBox = document.getElementById('lime-greeting-box'); DOM.mascotContainer = document.getElementById('lime-app-mascot'); DOM.inputArea = document.querySelector('.input-area');

        DOM.inputField.addEventListener('keypress', e => { if (e.key === 'Enter') { if (isRecording) toggleRecording(); else if (!isGenerating) sendMessage(); } });

        const eduDropdown = document.getElementById('edu-dropdown'), instDropdown = document.getElementById('inst-dropdown');
        if (eduDropdown) { if (globalEduLevel) eduDropdown.value = globalEduLevel; eduDropdown.addEventListener('change', async (e) => { globalEduLevel = e.target.value; localStorage.setItem('lime_edu_level', globalEduLevel); try { await supabaseClient.auth.updateUser({ data: { lime_edu_level: globalEduLevel } }); } catch (err) {} }); }
        if (instDropdown) { if (globalInstType) instDropdown.value = globalInstType; instDropdown.addEventListener('change', async (e) => { globalInstType = e.target.value; localStorage.setItem('lime_inst_type', globalInstType); try { await supabaseClient.auth.updateUser({ data: { lime_inst_type: globalInstType } }); } catch (err) {} }); }

        const { data: { session } } = await supabaseClient.auth.getSession();

        supabaseClient.auth.onAuthStateChange((event, session) => { if (session) { userId = session.user.id; document.getElementById('auth-section').classList.add('hidden'); document.getElementById('main-container').classList.remove('hidden'); updateProfileUI(session.user); loadHistory(); } else { userId = null; document.getElementById('auth-section').classList.remove('hidden'); document.getElementById('main-container').classList.add('hidden'); updateProfileUI(null); } });

    });
    
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') initSessionSync(); });
