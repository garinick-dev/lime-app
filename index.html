                    isImage = true; const formData = new FormData(); formData.append('file', currentFile); formData.append('user', userId); 
                    const uploadRes = await fetch(`${EDGE_FUNCTION_URL}?path=/files/upload`, { method: 'POST', headers: await getAuthHeaders(), body: formData });

                displayHtml = `<div style="font-size:0.85em; opacity:0.8; margin-bottom:5px;">📎 ${currentFile.name}</div>${displayHtml}`; 
            } catch (e) { 
                alert("Errore file"); isGenerating = false; DOM.sendBtn.disabled = false; 
                if (window.setMascotThinking) window.setMascotThinking(false); clearAttachment(); return; 
            } 
        }

        let finalQuery = query || " ", hiddenFileTag = currentFile ? `[--- FILE: ${currentFile.name} ---]\n` : '';
        if (extractedText) finalQuery = `${hiddenFileTag}${INJECT_START}\n${extractedText}\n${INJECT_END}\n${finalQuery}`; 
        else if (currentFile) finalQuery = `${hiddenFileTag}${finalQuery}`;

        const userWrapper = createMessageNode('user', displayHtml, null, true);
        DOM.chatBox.appendChild(userWrapper); scrollToBottom(true); 
        DOM.inputField.value = ""; clearAttachment(); DOM.inputField.focus(); 
        if (window.updateGreetingVisibility) window.updateGreetingVisibility();

        const botWrapper = createMessageNode('bot', "...", null); const botDiv = botWrapper.querySelector('.bot-msg'); DOM.chatBox.appendChild(botWrapper); 
        
        let fullAnswer = "", renderQueued = false, isThinkingLocal = true;
        let attempt = 0;
        const maxAttempts = 2;
        let success = false;
        let originalConversationId = currentConversationId; 

        while (attempt < maxAttempts && !success) {
            attempt++;
            fullAnswer = "";
            let hasError = false;
            isThinkingLocal = true;
            
            const controller = new AbortController();
            // Aumentato a 30 secondi per resistere al throttling in background
            let streamTimeout = setTimeout(() => controller.abort(), 30000); 

            try {
                const reqMode = isImage ? "blocking" : "streaming"; 
                const reqBody = { inputs: {}, query: finalQuery, user: userId, response_mode: reqMode }; 
                if (currentConversationId) reqBody.conversation_id = currentConversationId; 
                if (filePayload.length > 0) Object.assign(reqBody, { files: filePayload });
                
                const authHeaders = await getAuthHeaders(); 
                const res = await fetch(`${EDGE_FUNCTION_URL}?path=/chat-messages`, { 
                    method: 'POST', 
                    headers: { ...authHeaders, 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(reqBody),
                    signal: controller.signal

                if (!res.ok) throw new Error(`Errore Server: ${res.status}`);

                if (reqMode === "blocking") { 
                    clearTimeout(streamTimeout);
                    const data = await res.json(); 
                    if (data.answer && data.answer.trim().length > 0) {
                        if (window.setMascotThinking) window.setMascotThinking(false);
                        fullAnswer = data.answer; 
                        success = true;
                        
                        const bottomBar = botDiv.querySelector('.msg-bottom-bar'); 
                        let safeMathText = formatLaTeX(fullAnswer);
                        botDiv.innerHTML = window.marked ? DOMPurify.sanitize(marked.parse(safeMathText)) : DOMPurify.sanitize(safeMathText); 
                        botDiv.querySelectorAll('pre').forEach(pre => pre.insertAdjacentHTML('beforeend', '<button class="copy-btn">Copia</button>')); 
                        if(bottomBar) botDiv.appendChild(bottomBar); scrollToBottom(); 
                        
                        if (!currentConversationId && data.conversation_id) { currentConversationId = data.conversation_id; await supabaseClient.from('conversations').insert([{ user_id: userId, dify_id: currentConversationId, title: newChatTitle }]); loadHistory(); } 
                        if(currentConversationId) { 
                            if(!chatCache[currentConversationId]) chatCache[currentConversationId] = []; 
                            chatCache[currentConversationId].push({id: data.message_id || data.id || null, query: finalQuery, answer: fullAnswer, created_at: Math.floor(Date.now()/1000)}); 
                        } 
                    } else {
                        hasError = true;
                    }
                } else { 
                    const reader = res.body.getReader(), decoder = new TextDecoder("utf-8"); let buffer = ""; 
                    while (true) { 
                        clearTimeout(streamTimeout);
                        // Aumentato a 20 secondi per tollerare i ritardi in background
                        streamTimeout = setTimeout(() => controller.abort(), 20000); 
                        
                        const { done, value } = await reader.read();

                                        fullAnswer += data.answer;

                                        if (!renderQueued) {

                                            // Funzione di aggiornamento UI isolata
                                            const updateUI = () => {
                                                renderQueued = false; 
                                                const bottomBar = botDiv.querySelector('.msg-bottom-bar'); 
                                                let safeMathText = formatLaTeX(fullAnswer);
                                                botDiv.innerHTML = window.marked ? DOMPurify.sanitize(marked.parse(safeMathText)) : (window.DOMPurify ? DOMPurify.sanitize(safeMathText) : safeMathText); 
                                                if(bottomBar) botDiv.appendChild(bottomBar); 
                                                scrollToBottom(); 
                                            };
                                            
                                            // Aggiornamento testuale forzato se la pagina è in background
                                            if (document.hidden) {
                                                updateUI();
                                            } else {
                                                requestAnimationFrame(updateUI);
                                            }
                                        } 
                                    } else if (data.event === 'message_end') { 
                                        if (fullAnswer.trim().length > 0) {
                                            success = true;
                                            
                                            const finalizeUI = () => { botDiv.querySelectorAll('pre').forEach(pre => pre.insertAdjacentHTML('beforeend', '<button class="copy-btn">Copia</button>')); };
                                            if (document.hidden) finalizeUI(); else requestAnimationFrame(finalizeUI);
                                             
                                            if (!currentConversationId && data.conversation_id) { currentConversationId = data.conversation_id; await supabaseClient.from('conversations').insert([{ user_id: userId, dify_id: currentConversationId, title: newChatTitle }]); loadHistory(); } 
                                            if(currentConversationId) { 
                                                if(!chatCache[currentConversationId]) chatCache[currentConversationId] = []; 
                                                chatCache[currentConversationId].push({id: data.message_id || data.id || null, query: finalQuery, answer: fullAnswer, created_at: Math.floor(Date.now()/1000)}); 
                                            }
                                        } else {
                                            hasError = true; 
                                        }
                                    }

            }

            if (hasError && attempt < maxAttempts) {
                await new Promise(r => setTimeout(r, 1000)); 
            }
        } 
        
        // Se la risposta è vuota o la bolla non ha contenuto testuale, dichiariamo il fallimento
        if (fullAnswer.trim().length === 0 || botDiv.innerText.trim() === "") success = false;

        if (!success) {
            fullAnswer = `🚫📶 Ci siamo persi! Ritento la risposta? <br><br><button onclick="retryLastMessage(this)" data-query="${encodeURIComponent(query)}" style="background: var(--accent); color: #000; font-weight: bold; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: transform 0.2s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">Riprova</button>`;
            const bottomBar = botDiv.querySelector('.msg-bottom-bar'); 
            botDiv.innerHTML = fullAnswer; 
            if(bottomBar) botDiv.appendChild(bottomBar); 
            
            if (!originalConversationId && currentConversationId) {

        if (success && currentConversationId) {
            const chatIndex = allChats.findIndex(c => String(c.dify_id) === String(currentConversationId));

                const [activeChat] = allChats.splice(chatIndex, 1);

                    .update({ created_at: new Date().toISOString() })

        DOM.sendBtn.disabled = false; scrollToBottom(true);

        // Ritardiamo l'osservatore per permettere allo scorrimento fluido di terminare in pace
        setTimeout(() => {

    function lightenColor(hex, percent) {
        hex = hex.replace(/^#/, '');
        if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
        let r = parseInt(hex.slice(0, 2), 16), g = parseInt(hex.slice(2, 4), 16), b = parseInt(hex.slice(4, 6), 16);
        r = Math.round(r + (255 - r) * percent); g = Math.round(g + (255 - g) * percent); b = Math.round(b + (255 - b) * percent);
        return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1);
    }

    async function uploadToSupabaseStorage(file, pathPrefix) {

        const fileName = `${pathPrefix}_${Date.now()}.${fileExt}`; 
        const { data, error } = await supabaseClient.storage.from('lime-assets').upload(fileName, file, { upsert: true }); 
        if (error) { alert("Errore caricamento immagine."); return null; } 
        const { data: { publicUrl } } = supabaseClient.storage.from('lime-assets').getPublicUrl(fileName);

    }

    async function handleBgUpload(event) { 
        if (!userId) return; 
        const file = event.target.files[0]; 
        if (file) { 
            const btn = document.querySelector('.bg-upload-btn');
            const prevText = btn.innerText;
            btn.innerText = 'Caricamento...';
            
            // Usiamo FileReader: trasforma l'immagine in Base64, infallibile su mobile
            const reader = new FileReader(); 
            reader.onload = async function(e) { 
                // 1. Anteprima istantanea e scattante
                applyChatBackground(e.target.result); 
                
                // 2. Procediamo con il caricamento in background
                try {
                    const { data: { user } } = await supabaseClient.auth.getUser(); 
                    const oldUrl = user?.user_metadata?.bg; 
                    const publicUrl = await uploadToSupabaseStorage(file, `bg/${userId}`); 
                    
                    if (publicUrl) { 
                        localStorage.setItem('lime_bg', publicUrl); 
                        queueProfileUpdate({ bg: publicUrl });
                        
                        // 3. Sostituiamo il pesante Base64 con l'URL leggero definitivo
                        applyChatBackground(publicUrl);
                        
                        if (oldUrl && oldUrl !== publicUrl) deleteOldSupabaseFile(oldUrl); 
                    } 
                } catch(err) {
                    console.error("Errore salvataggio sfondo:", err);
                } finally {
                    btn.innerText = prevText;
                    // Resettiamo l'input per poter caricare di nuovo la stessa foto se serve
                    document.getElementById('bg-input').value = ''; 
                }
            }; 
            // Avvia la lettura dell'immagine
            reader.readAsDataURL(file); 
        } 
    }

            new MutationObserver((mutations) => { 
                if (window.updateGreetingVisibility) window.updateGreetingVisibility();
                mutations.forEach((m) => { if (m.addedNodes.length > 0) m.addedNodes.forEach((n) => { if (n.nodeType === 1) { const t = n.innerText || ""; if (t.includes('@1') || t.includes('@2') || t.includes('@3') || t.includes('@4')) n.classList.add('ghost-hidden'); } }); }); 
            }).observe(DOM.chatBox, { childList: true, subtree: true }); 
        }
        
        function playBody() { if (document.hidden) return setTimeout(playBody, 2000); if (isThinking) return setTimeout(playBody, 1000); const r = Math.random() * 100, a = r < 60 ? 'anim-squeeze' : r < 90 ? 'anim-roll' : 'anim-jump'; bodyM.classList.add(a); bodyM.addEventListener('animationend', () => { bodyM.classList.remove(a); setTimeout(playBody, Math.random() * 4000 + 3000); }, { once: true }); }
        function playBlink() { if (document.hidden) return setTimeout(playBlink, 2000); if (!isThinking) { eyesM.forEach(e => e.classList.add('anim-blink')); setTimeout(() => eyesM.forEach(e => e.classList.remove('anim-blink')), 150); } setTimeout(playBlink, Math.random() * 5000 + 2000); }
        function look() { if (document.hidden) return setTimeout(look, 2000); if (isThinking) return setTimeout(look, 1000); const dirs = [{x:0,y:0},{x:0,y:-4},{x:0,y:4},{x:4,y:0},{x:-4,y:0},{x:3,y:-3},{x:-3,y:-3},{x:3,y:3},{x:-3,y:3}]; const d = dirs[Math.floor(Math.random() * dirs.length)]; eyesM.forEach(e => { e.style.setProperty('--lx', d.x+'px'); e.style.setProperty('--ly', d.y+'px'); e.style.transform = `translate(${d.x}px, ${d.y}px)`; }); setTimeout(look, Math.random() * 3000 + 2000); }

    function setupViewportAnchoring() {
        const mascotSvg = document.querySelector('#lime-app-mascot svg');
        let lastMsgPadding = -1, lockedWidth = window.innerWidth, lockedHeight = window.innerHeight;

        function lockDimensions() { document.body.style.height = lockedHeight + 'px'; document.documentElement.style.height = lockedHeight + 'px'; }
        lockDimensions();

        window.syncAnchoring = function() {
            const breathArea = document.getElementById('breath-area');
            if (breathArea) { const breathRect = breathArea.getBoundingClientRect(), viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight, requiredPadding = Math.max(0, viewportHeight - breathRect.top); document.documentElement.style.setProperty('--breath-padding', requiredPadding + 'px'); }
            if (DOM.chatBox) { const targetY = mascotSvg ? (mascotSvg.getBoundingClientRect().top + (mascotSvg.getBoundingClientRect().height / 2)) : lockedHeight / 2; const boxRect = DOM.chatBox.getBoundingClientRect(), requiredPadding = Math.max(0, boxRect.bottom - targetY); if (Math.abs(requiredPadding - lastMsgPadding) > 1) lastMsgPadding = requiredPadding; }
        };
        
        window.syncAnchoring();
        window.addEventListener('resize', () => { if (window.innerWidth !== lockedWidth) { lockedWidth = window.innerWidth; lockedHeight = window.innerHeight; lockDimensions(); } window.syncAnchoring(); }, { passive: true });

        if (window.visualViewport) {
            function trickKeyboard() { const vvHeight = window.visualViewport.height, vvOffset = window.visualViewport.offsetTop, keyboardHeight = Math.max(0, lockedHeight - (vvHeight + vvOffset)), shiftY = `translateY(-${keyboardHeight}px)`; if (DOM.inputArea) DOM.inputArea.style.transform = `${shiftY} translateZ(0)`; if (DOM.chatBox) DOM.chatBox.style.transform = shiftY; if (DOM.greetingBox) DOM.greetingBox.style.transform = shiftY; window.scrollTo(0, 0); window.syncAnchoring(); }
            window.visualViewport.addEventListener('resize', trickKeyboard, { passive: true }); window.visualViewport.addEventListener('scroll', trickKeyboard, { passive: true });
        }

        window.scrollToBottom = function(force = false) { if (DOM.chatBox && (!window.isUserScrolling || force)) DOM.chatBox.scrollTop = DOM.chatBox.scrollHeight; };
        
        if (DOM.chatBox) new MutationObserver((m) => { 
            let shouldScroll = false; 
            m.forEach(x => { if (x.addedNodes.length > 0) shouldScroll = true; }); 
            if (shouldScroll) {
                requestAnimationFrame(() => { 
                    window.syncAnchoring(); 
                    if (!isPrependInProgress && window.scrollToBottom) window.scrollToBottom(true); 
                }); 
            }
        }).observe(DOM.chatBox, { childList: true });
    }

    function setupMathAndSanitization() {
        if (!window.marked || !window.DOMPurify) return; 
        if (window.marked && window.markedKatex) marked.use(window.markedKatex({ throwOnError: false }), { breaks: true, gfm: true });
        
        const originalSanitize = window.DOMPurify.sanitize;
        window.DOMPurify.sanitize = function(content, config) {
            return originalSanitize.call(window.DOMPurify, content, Object.assign({}, config || {}, { ADD_TAGS: ['math', 'annotation', 'semantics', 'mrow', 'mi', 'mo', 'mn', 'msup', 'msub', 'msubsup', 'mfrac', 'msqrt', 'mroot', 'mtable', 'mtr', 'mtd', 'mspace', 'mtext', 'path', 'line', 'svg', 'g', 'think'], ADD_ATTR: ['xmlns', 'display', 'aria-hidden', 'style', 'class', 'd', 'viewBox', 'preserveAspectRatio', 'x', 'y', 'width', 'height'] }));
        };

        function syncThumb(el, scrollbar) {
            const thumb = scrollbar.querySelector('.math-thumb'); if (!thumb) return;
            const scrollableWidth = el.scrollWidth - el.clientWidth; if (scrollableWidth <= 0) return;
            const scrollRatio = el.scrollLeft / scrollableWidth, thumbPercent = Math.max(15, (el.clientWidth / el.scrollWidth) * 100);
            thumb.style.width = thumbPercent + '%'; thumb.style.left = `calc(${scrollRatio} * (100% - ${thumbPercent}%))`;
        }

        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                const el = entry.target; let scrollbar = el.nextElementSibling;
                if (!scrollbar || !scrollbar.classList.contains('math-scrollbar')) {
                    scrollbar = document.createElement('div'); scrollbar.className = 'math-scrollbar';
                    scrollbar.innerHTML = `<div class="math-arrow left"></div><div class="math-track"><div class="math-thumb"></div></div><div class="math-arrow right"></div>`;
                    el.insertAdjacentElement('afterend', scrollbar); el.addEventListener('scroll', () => syncThumb(el, scrollbar), { passive: true });
                }
                const isOverflowing = el.scrollWidth > el.clientWidth + 2; scrollbar.style.display = isOverflowing ? 'flex' : 'none';
                if (isOverflowing) syncThumb(el, scrollbar);
            }
        });

        const mutationObserver = new MutationObserver((mutations) => { mutations.forEach((m) => { m.addedNodes.forEach((n) => { if (n.nodeType === 1) { if (n.classList.contains('katex-display')) resizeObserver.observe(n); const mathBlocks = n.querySelectorAll ? n.querySelectorAll('.katex-display') : []; mathBlocks.forEach(b => resizeObserver.observe(b)); } }); }); });
        if (DOM.chatBox) mutationObserver.observe(DOM.chatBox, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', async () => {

        async function fetchFreshData() {
            if (!userId) return;
            try {
                const userPromise = supabaseClient.auth.getUser();
                const timeoutPromise = new Promise((resolve) => setTimeout(() => resolve({ error: 'timeout' }), 2000));
                const result = await Promise.race([userPromise, timeoutPromise]);
                
                if (result && result.data && result.data.user) {
                    if (Object.keys(pendingProfileUpdates).length === 0) {
                        updateProfileUI(result.data.user);
                    }
                }
            } catch (e) {}
        }
        
        document.addEventListener('visibilitychange', () => { 
            if (document.visibilityState === 'visible') {
                fetchFreshData(); 
            }
        });
        
        DOM = {
            chatBox: document.getElementById('chat-box'), inputField: document.getElementById('user-input'), sendBtn: document.getElementById('send-btn'), sidebar: document.getElementById('sidebar'), backdrop: document.getElementById('sidebar-backdrop'), historyList: document.getElementById('history-list'), greetingBox: document.getElementById('lime-greeting-box'), mascotContainer: document.getElementById('lime-app-mascot'), inputArea: document.querySelector('.input-area'), micBtn: document.getElementById('mic-btn'), attachBtn: document.getElementById('attach-btn'), timerDisplay: document.getElementById('recording-timer'), attachmentLabel: document.getElementById('attachment-label'), fileInput: document.getElementById('file-input'), eduDropdown: document.getElementById('edu-dropdown'), instDropdown: document.getElementById('inst-dropdown'), bgInput: document.getElementById('bg-input')
        };

        const redSquareBtn = document.getElementById('tutorial-red-square');
        if (redSquareBtn) {
            redSquareBtn.addEventListener('click', () => {
                redSquareBtn.style.opacity = '0';
                redSquareBtn.style.transform = 'scale(0.8)';
                setTimeout(() => { redSquareBtn.style.display = 'none'; }, 200);
                queueProfileUpdate({ tutorial_done: true });
            });
        }

        let inputDebounce, scrollTimeout; 
        if (DOM.chatBox) {
            DOM.chatBox.addEventListener('scroll', () => { if (!scrollTimeout) { scrollTimeout = requestAnimationFrame(() => { isUserScrolling = (DOM.chatBox.scrollHeight - DOM.chatBox.scrollTop) > (DOM.chatBox.clientHeight + 100); scrollTimeout = null; }); } }, { passive: true });
            DOM.chatBox.addEventListener('click', (e) => { const copyBtn = e.target.closest('.copy-btn'); if (copyBtn) { const pre = copyBtn.closest('pre'); if(pre) { navigator.clipboard.writeText(pre.querySelector('code').innerText); copyBtn.innerText = 'Copiato!'; setTimeout(() => copyBtn.innerText = 'Copia', 2000); } } });
        }
        
        if (DOM.inputField) {
            const textarea = DOM.inputField;
            
            const autoResize = () => {
                textarea.style.height = '40px'; 
                const requiredHeight = textarea.scrollHeight;
                textarea.style.height = Math.max(Math.min(requiredHeight, 120), 40) + 'px';
                if (window.syncAnchoring) window.syncAnchoring();
            };

            const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, "value").set;
            Object.defineProperty(textarea, 'value', {
                set: function(val) {
                    nativeInputValueSetter.call(this, val);
                    autoResize();
                },
                get: function() {
                    return Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, "value").get.call(this);
                }
            });

            textarea.addEventListener('input', () => {
                autoResize();
                
                if (textarea.value.trim().length > 0) {
                    if (DOM.micBtn) DOM.micBtn.classList.add('hidden');
                } else {
                    if (DOM.micBtn && !isRecording) DOM.micBtn.classList.remove('hidden');
                }

                clearTimeout(inputDebounce);
                inputDebounce = setTimeout(() => { 
                    if (window.updateGreetingVisibility) window.updateGreetingVisibility(); 
                }, 150);
            });

            const triggerSend = () => {
                if (isRecording) {
                    toggleRecording();
                } else if (!isGenerating) {
                    sendMessage();
                }
            };

            textarea.addEventListener('keydown', (e) => {
                if (!e.isTrusted) {
                    e.preventDefault();
                    triggerSend();
                    return;
                }

                const isStrictMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

                if (e.key === 'Enter' && !e.shiftKey) {
                    if (isStrictMobile) {
                        e.stopPropagation();
                    } else {
                        e.preventDefault(); 
                        triggerSend();
                    }
                }
            }, true);

            autoResize();
        }
        
        setupViewportAnchoring();
        initLimeExtras();
        setupChatVirtualization();

        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) { 
            userId = session.user.id; 
            clearCacheIfNewUser(userId);
            document.getElementById('auth-section').classList.add('hidden'); document.getElementById('main-container').classList.remove('hidden'); 
            if (window.syncAnchoring) window.syncAnchoring();
            
            const { data: { user } } = await supabaseClient.auth.getUser();
            updateProfileUI(user || session.user); 
            
            loadHistory(); 
            if (window.updateGreetingVisibility) window.updateGreetingVisibility();
            await loadHeavyLibraries(); 
        }
        
        supabaseClient.auth.onAuthStateChange(async (event, session) => { 
            if (event === 'USER_UPDATED') return; 
            
            if (event === 'SIGNED_OUT') {
                userId = null; 
                document.getElementById('auth-section').classList.remove('hidden'); 
                document.getElementById('main-container').classList.add('hidden'); 
                updateProfileUI(null); 
                return;
            }

            if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
                if (session) { 
                    if (userId === session.user.id) return; 
                    
                    userId = session.user.id; 
                    clearCacheIfNewUser(userId);
                    document.getElementById('auth-section').classList.add('hidden'); document.getElementById('main-container').classList.remove('hidden'); 
                    if (window.syncAnchoring) window.syncAnchoring();
                    
                    const { data: { user } } = await supabaseClient.auth.getUser();
                    updateProfileUI(user || session.user);

        setTimeout(() => { if (!currentCustomBg) updateDefaultBackground(); }, 150);
    });

<style>
    /* Rettangolo grigio semitrasparente con blur richiesto */
    #tutorial-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 15, 15, 0.65);
        backdrop-filter: blur(10px);
        z-index: 1000; /* Livello base del blur richiesto */
        display: none;
        pointer-events: all; /* Impedisce interazioni con la chat durante il tutorial */
    }

    /* Pulsante Avanti verde */
    #tutorial-next-btn {
        position: fixed;
        bottom: 120px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1005; /* Sempre sopra l'evidenziazione */
        background: #28a745; /* Verde richiesto */
        color: white;
        border: none;
        padding: 12px 35px;
        border-radius: 30px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        display: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        transition: transform 0.2s;
    }
    #tutorial-next-btn:active { transform: translateX(-50%) scale(0.95); }
</style>

<div id="tutorial-overlay"></div>
<button id="tutorial-next-btn" onclick="nextTutorialStep()">Avanti</button>

<script>
    let currentStep = 0;
    // Lista degli elementi da evidenziare con i loro z-index originali presi dal codice
    const tutorialSteps = [
        { selector: '.menu-toggle', originalZ: 'auto', needsPos: true },
        { selector: '#lime-greeting-box', originalZ: '1000', needsPos: false },
        { selector: '.input-wrapper', originalZ: '50', needsPos: false }
    ];

    /**
     * Gestisce l'avanzamento del tutorial e la variazione degli z-index
     */
    function nextTutorialStep() {
        // 1. Ripristiniamo l'elemento precedente
        if (currentStep > 0) {
            const prev = tutorialSteps[currentStep - 1];
            const prevEl = document.querySelector(prev.selector);
            if (prevEl) {
                prevEl.style.zIndex = prev.originalZ;
                if (prev.needsPos) prevEl.style.position = '';
            }
        }

        // 2. Controllo fine tutorial
        if (currentStep >= tutorialSteps.length) {
            closeTutorialInteractive();
            return;
        }

        // 3. Evidenziamo il nuovo elemento portandolo a 1001
        const current = tutorialSteps[currentStep];
        const el = document.querySelector(current.selector);
        if (el) {
            if (current.needsPos) el.style.position = 'relative'; 
            el.style.zIndex = "1001";
            
            // Se è l'area di input, facciamo scorrere la vista per sicurezza
            if (current.selector === '.input-area') window.syncAnchoring();
        }

        currentStep++;
    }

    function closeTutorialInteractive() {
        document.getElementById('tutorial-overlay').style.display = 'none';
        document.getElementById('tutorial-next-btn').style.display = 'none';
        currentStep = 0;
        if (typeof queueProfileUpdate === 'function') {
            queueProfileUpdate({ tutorial_done: true });
        }
    }

    function startInteractiveTutorial() {
        currentStep = 0;
        document.getElementById('tutorial-overlay').style.display = 'block';
        document.getElementById('tutorial-next-btn').style.display = 'block';
        nextTutorialStep();
    }

    // Integrazione con i sistemi esistenti
    (function patchInteractiveLogic() {
        // Nascondiamo il vecchio quadrato rosso
        const redSquare = document.getElementById('tutorial-red-square');
        if (redSquare) redSquare.style.display = 'none';

        // Modifica pulsante di debug per i tuoi test
        const colorPicker = document.getElementById('color-picker');
        if (colorPicker) {
            const btn = document.createElement('button');
            btn.className = 'debug-tutorial-btn';
            btn.innerText = 'DEBUG: Start Tutorial';
            btn.onclick = startInteractiveTutorial;
            colorPicker.parentNode.appendChild(btn);
        }

        // Trigger automatico per nuovi utenti basato sul profilo
        const originalUpdateProfileUI = window.updateProfileUI;
        window.updateProfileUI = function(user) {
            if (originalUpdateProfileUI) originalUpdateProfileUI(user);
            if (user && user.user_metadata && user.user_metadata.tutorial_done !== true) {
                startInteractiveTutorial();
            }
        };
    })();
</script>
