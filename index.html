    async function sendMessage() {
        if (isRecording) { toggleRecording(); return; } if (isGenerating) return;
        let query = DOM.inputField.value.trim(); if ((!query && !currentFile) || query.startsWith('🔴')) return;
        isGenerating = true; if (window.setGreetingVisible) window.setGreetingVisible(false); if (window.setMascotThinking) window.setMascotThinking(true); 
        DOM.sendBtn.disabled = true;

        let filePayload = [], extractedText = null, isImage = false; 
        let displayHtml = query.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));

        if (currentFile) {
            document.getElementById('attachment-label').innerText = "Elaborazione...";
            try {
                if (currentFile.type.startsWith('image/')) {
                    isImage = true; const formData = new FormData(); formData.append('file', currentFile); formData.append('user', userId);
                    // UPLOAD TRAMITE PROXY
                    const uploadRes = await fetch(`${EDGE_FUNCTION_URL}?path=/files/upload`, { method: 'POST', headers: await getAuthHeaders(), body: formData });
                    filePayload.push({ type: 'image', transfer_method: 'local_file', upload_file_id: (await uploadRes.json()).id });
                } else extractedText = await extractTextFromFile(currentFile);
                displayHtml = `<div style="font-size:0.85em; opacity:0.8; margin-bottom:5px;">📎 ${currentFile.name}</div>${displayHtml}`;
            } catch (e) { alert("Errore file"); isGenerating = false; DOM.sendBtn.disabled = false; if (window.setMascotThinking) window.setMascotThinking(false); clearAttachment(); return; }
        }

        let finalQuery = query || " ", hiddenFileTag = currentFile ? `[--- FILE: ${currentFile.name} ---]\n` : '';
        if (extractedText) finalQuery = `${hiddenFileTag}${INJECT_START}\n${extractedText}\n${INJECT_END}\n${finalQuery}`; else if (currentFile) finalQuery = `${hiddenFileTag}${finalQuery}`;

        DOM.chatBox.appendChild(createMessageNode('user', displayHtml, null, true)); scrollToBottom(true);
        DOM.inputField.value = ""; clearAttachment(); DOM.inputField.focus(); 

        const botWrapper = createMessageNode('bot', "...", null); const botDiv = botWrapper.querySelector('.bot-msg'); DOM.chatBox.appendChild(botWrapper);
        let fullAnswer = "", renderQueued = false;

        try {
            const reqMode = isImage ? "blocking" : "streaming";
            const reqBody = { inputs: {}, query: finalQuery, user: userId, response_mode: reqMode, conversation_id: currentConversationId };
            if (filePayload.length > 0) Object.assign(reqBody, { files: filePayload });

            // MESSAGGIO TRAMITE PROXY
            const authHeaders = await getAuthHeaders();
            const res = await fetch(`${EDGE_FUNCTION_URL}?path=/chat-messages`, { 
                method: 'POST', 
                headers: { ...authHeaders, 'Content-Type': 'application/json' }, 
                body: JSON.stringify(reqBody) 
            });

            if (reqMode === "blocking") {
                if (window.setMascotThinking) window.setMascotThinking(false); const data = await res.json(); fullAnswer = data.answer || "";
                const bottomBar = botDiv.querySelector('.msg-bottom-bar'); 
                // SANITIZZAZIONE
                botDiv.innerHTML = window.marked ? DOMPurify.sanitize(marked.parse(fullAnswer)) : DOMPurify.sanitize(fullAnswer); 
                botDiv.querySelectorAll('pre').forEach(pre => pre.insertAdjacentHTML('beforeend', '<button class="copy-btn">Copia</button>')); if(bottomBar) botDiv.appendChild(bottomBar); scrollToBottom();
                if (!currentConversationId && data.conversation_id) { currentConversationId = data.conversation_id; await supabaseClient.from('conversations').insert([{ user_id: userId, dify_id: currentConversationId, title: query.substring(0, 35) || "Nuova Chat" }]); loadHistory(); }
                if(!chatCache[currentConversationId]) chatCache[currentConversationId] = []; chatCache[currentConversationId].push({query: finalQuery, answer: fullAnswer, created_at: Math.floor(Date.now()/1000)});
            } else {
                const reader = res.body.getReader(), decoder = new TextDecoder("utf-8"); let buffer = "", firstChunk = true;
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    if (firstChunk) { firstChunk = false; if (window.setMascotThinking) window.setMascotThinking(false); }
                    buffer += decoder.decode(value, { stream: true }); const lines = buffer.split('\n\n'); buffer = lines.pop(); 
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                if (data.event === 'message') {
                                    fullAnswer += data.answer;
                                    if (!renderQueued) {
                                        renderQueued = true;
                                        requestAnimationFrame(() => {
                                            const bottomBar = botDiv.querySelector('.msg-bottom-bar');
                                            // SANITIZZAZIONE
                                            botDiv.innerHTML = window.marked ? DOMPurify.sanitize(marked.parse(fullAnswer)) : DOMPurify.sanitize(fullAnswer); if(bottomBar) botDiv.appendChild(bottomBar);
                                            scrollToBottom(); renderQueued = false;
                                        });
                                    }
                                } else if (data.event === 'message_end') {
                                    botDiv.querySelectorAll('pre').forEach(pre => pre.insertAdjacentHTML('beforeend', '<button class="copy-btn">Copia</button>'));
                                    if (!currentConversationId && data.conversation_id) { currentConversationId = data.conversation_id; await supabaseClient.from('conversations').insert([{ user_id: userId, dify_id: currentConversationId, title: query.substring(0, 35) || "Nuova Chat" }]); loadHistory(); }
                                    if(currentConversationId) { if(!chatCache[currentConversationId]) chatCache[currentConversationId] = []; chatCache[currentConversationId].push({query: finalQuery, answer: fullAnswer, created_at: Math.floor(Date.now()/1000)}); }
                                }
                            } catch (e) {}
                        }
                    }
                }
            }
            const activeSidebarItem = document.getElementById(`chat-${currentConversationId}`); if (activeSidebarItem) DOM.historyList.prepend(activeSidebarItem);
        } catch (e) { const bottomBar = botDiv.querySelector('.msg-bottom-bar'); botDiv.innerHTML = `⚠️ Errore LIME.`; if(bottomBar) botDiv.appendChild(bottomBar); } 
        finally { isGenerating = false; if (window.setMascotThinking) window.setMascotThinking(false); DOM.sendBtn.disabled = false; scrollToBottom(true); }
    }

    async function uploadToSupabaseStorage(file, pathPrefix) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${pathPrefix}_${Date.now()}.${fileExt}`;
        const { data, error } = await supabaseClient.storage.from('lime-assets').upload(fileName, file, { upsert: true });
        if (error) { alert("Errore caricamento immagine."); return null; }
        const { data: { publicUrl } } = supabaseClient.storage.from('lime-assets').getPublicUrl(fileName);
        return publicUrl;
    }

    // Funzione dedicata alla pulizia del vecchio file
    async function deleteOldSupabaseFile(oldUrl) {
        if (!oldUrl) return;
        try {
            const bucketMarker = '/lime-assets/';
            const index = oldUrl.indexOf(bucketMarker);
            if (index !== -1) {
                const filePath = oldUrl.substring(index + bucketMarker.length);
                await supabaseClient.storage.from('lime-assets').remove([filePath]);
            }
        } catch (e) { console.error("Errore rimozione vecchio file", e); }
    }

    async function handlePfpUpload(event) {
        if (!userId) return; const file = event.target.files[0];
        if (file) { 
            const reader = new FileReader(); reader.onload = function(e) { [document.getElementById('user-initial'), document.getElementById('settings-user-avatar')].forEach(div => { div.style.backgroundImage = `url(${e.target.result})`; div.innerText = ''; }); }; reader.readAsDataURL(file); 
            
            const { data: { user } } = await supabaseClient.auth.getUser();
            const oldUrl = user?.user_metadata?.pfp;
            
            const publicUrl = await uploadToSupabaseStorage(file, `pfp/${userId}`);
            if (publicUrl) {
                await supabaseClient.auth.updateUser({ data: { pfp: publicUrl } });
                if (oldUrl) await deleteOldSupabaseFile(oldUrl); // Pulizia
            }
        }
    }

    async function handleBgUpload(event) {
        if (!userId) return; const file = event.target.files[0];
        if (file) { 
            const reader = new FileReader(); reader.onload = function(e) { applyChatBackground(e.target.result); }; reader.readAsDataURL(file); 
            
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (publicUrl) {
                await supabaseClient.auth.updateUser({ data: { bg: publicUrl } });

    }

        let isThinking = false;

        window.setGreetingVisible = (visible) => {
            if (!DOM.greetingBox) return; DOM.greetingBox.style.opacity = visible ? '1' : '0'; DOM.greetingBox.style.visibility = visible ? 'visible' : 'hidden';
        };

        if(DOM.chatBox && DOM.chatBox.innerHTML.trim() === "") window.setGreetingVisible(true);

        const sendTrigger = (code) => {
            if (!DOM.inputField) return; DOM.inputField.value = code; DOM.inputField.dispatchEvent(new Event('input', { bubbles: true }));
            const e = { bubbles: true, cancelable: true, key: 'Enter', code: 'Enter', keyCode: 13, which: 13 };
            DOM.inputField.dispatchEvent(new KeyboardEvent('keydown', e)); DOM.inputField.dispatchEvent(new KeyboardEvent('keypress', e)); DOM.inputField.dispatchEvent(new KeyboardEvent('keyup', e));
        };

        window.setMascotThinking = (state) => { isThinking = state; eyesM.forEach(e => state ? e.classList.add('eyes-closed') : e.classList.remove('eyes-closed')); };

        function syncFloatingUI() {
            if (!DOM.chatBox) return; const rect = DOM.chatBox.getBoundingClientRect();
            if (DOM.greetingBox) { DOM.greetingBox.style.width = rect.width + "px"; DOM.greetingBox.style.left = rect.left + "px"; }
            if (DOM.mascotContainer && DOM.inputArea) {
                const rI = DOM.inputArea.getBoundingClientRect(); DOM.mascotContainer.style.left = (rect.left + 5) + "px"; DOM.mascotContainer.style.bottom = (window.innerHeight - rI.top - 22) + "px";
            }
        }
        
        syncFloatingUI();
        const resizeObserver = new ResizeObserver(() => requestAnimationFrame(syncFloatingUI));
        resizeObserver.observe(document.body); if (DOM.inputArea) resizeObserver.observe(DOM.inputArea);
        window.addEventListener('resize', () => requestAnimationFrame(syncFloatingUI), { passive: true });

        if (DOM.chatBox) {
            new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.addedNodes.length > 0) {
                        mutation.addedNodes.forEach((node) => {
                            if (node.nodeType === 1) { 
                                const t = node.innerText || "";
                                if (t.includes('@1') || t.includes('@2') || t.includes('@3') || t.includes('@4')) node.classList.add('ghost-hidden');
                            }
                        });
                    }
                });
            }).observe(DOM.chatBox, { childList: true, subtree: true });
        }

        function playBody() { if (isThinking) return setTimeout(playBody, 1000); const r = Math.random() * 100, a = r < 60 ? 'anim-squeeze' : r < 90 ? 'anim-roll' : 'anim-jump'; bodyM.classList.add(a); bodyM.addEventListener('animationend', () => { bodyM.classList.remove(a); setTimeout(playBody, Math.random() * 4000 + 3000); }, { once: true }); }
        function playBlink() { if (!isThinking) { eyesM.forEach(e => e.classList.add('anim-blink')); setTimeout(() => eyesM.forEach(e => e.classList.remove('anim-blink')), 150); } setTimeout(playBlink, Math.random() * 5000 + 2000); }
        function look() { if (isThinking) return setTimeout(look, 1000); const dirs = [{x:0,y:0},{x:0,y:-4},{x:0,y:4},{x:4,y:0},{x:-4,y:0},{x:3,y:-3},{x:-3,y:-3},{x:3,y:3},{x:-3,y:3}]; const d = dirs[Math.floor(Math.random() * dirs.length)]; eyesM.forEach(e => { e.style.setProperty('--lx', d.x+'px'); e.style.setProperty('--ly', d.y+'px'); e.style.transform = `translate(${d.x}px, ${d.y}px)`; }); setTimeout(look, Math.random() * 3000 + 2000); }
        setTimeout(playBody, 2000); setTimeout(playBlink, 2500); setTimeout(look, 3000);

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('lime-chip')) { sendTrigger(e.target.getAttribute('data-trigger')); window.setGreetingVisible(false); }
            if (e.target.innerText && e.target.innerText.includes('Nuova chat')) window.setGreetingVisible(true);
            if (e.target.closest('.history-item')) window.setGreetingVisible(false);
        });
        document.addEventListener('keydown', (e) => { if (e.key === 'Enter') window.setGreetingVisible(false); });
    }

    // ==========================================
    // 9. INIZIALIZZAZIONE GLOBALE
    // ==========================================
    document.addEventListener('DOMContentLoaded', async () => {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            userId = session.user.id; document.getElementById('auth-section').classList.add('hidden'); document.getElementById('main-container').classList.remove('hidden');
            updateProfileUI(session.user); loadHistory();
        }
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                userId = session.user.id; document.getElementById('auth-section').classList.add('hidden'); document.getElementById('main-container').classList.remove('hidden');
                updateProfileUI(session.user); loadHistory();
            } else {
                userId = null; document.getElementById('auth-section').classList.remove('hidden'); document.getElementById('main-container').classList.add('hidden'); updateProfileUI(null);
            }
        });
        initLimeExtras();
    });
</script>
