                            wrapper.style.minHeight = rect.height + 'px';

    function lightenColor(hex, percent) {

        if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
        let r = parseInt(hex.slice(0, 2), 16), g = parseInt(hex.slice(2, 4), 16), b = parseInt(hex.slice(4, 6), 16);
        r = Math.round(r + (255 - r) * percent); g = Math.round(g + (255 - g) * percent); b = Math.round(b + (255 - b) * percent);
        return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1);
    }

        const { data, error } = await supabaseClient.storage.from('lime-assets').upload(fileName, file, { upsert: true });

    }

    async function handleBgUpload(event) { 
        if (!userId) return; 
        const file = event.target.files[0]; 
        if (file) { 
            const btn = document.querySelector('.bg-upload-btn');
            const prevText = btn.innerText;
            btn.innerText = 'Caricamento...';
            
            // Usiamo FileReader: trasforma l'immagine in Base64, infallibile su mobile
            const reader = new FileReader(); 
            reader.onload = async function(e) { 
                // 1. Anteprima istantanea e scattante
                applyChatBackground(e.target.result); 
                
                // 2. Procediamo con il caricamento in background
                try {
                    const { data: { user } } = await supabaseClient.auth.getUser(); 
                    const oldUrl = user?.user_metadata?.bg; 
                    const publicUrl = await uploadToSupabaseStorage(file, `bg/${userId}`); 
                    
                    if (publicUrl) { 
                        localStorage.setItem('lime_bg', publicUrl); 
                        queueProfileUpdate({ bg: publicUrl });
                        
                        // 3. Sostituiamo il pesante Base64 con l'URL leggero definitivo
                        applyChatBackground(publicUrl);
                        
                        if (oldUrl && oldUrl !== publicUrl) deleteOldSupabaseFile(oldUrl); 
                    } 
                } catch(err) {
                    console.error("Errore salvataggio sfondo:", err);
                } finally {
                    btn.innerText = prevText;
                    // Resettiamo l'input per poter caricare di nuovo la stessa foto se serve
                    document.getElementById('bg-input').value = ''; 
                }
            }; 
            // Avvia la lettura dell'immagine
            reader.readAsDataURL(file); 
        } 
    }

<script>

    const SVG_ICON = `<svg viewBox="0 0 24 24" fill="currentColor" style="width: 15px; height: 15px;"><path d="M6.581,14.414H3.292l-0.574,1.859H0.155l3.65-9.953h2.256l3.678,9.953H7.162L6.581,14.414z M3.867,12.561h2.14L4.933,9.109 L3.867,12.561z M16.685,18.528c-1.925,1.507-4.547,2.05-7.031,1.21l0,0l0.801-2.368l-2.758,1.364h0L5.75,19.696l0.043,0.075 c0,0,0,0,0,0L8.212,24l0.801-2.368c3.005,1.017,6.167,0.43,8.57-1.287l-0.256-0.517L16.685,18.528z M7.771,5.472 c1.925-1.507,4.547-2.05,7.031-1.21l0,0L14,6.631l2.758-1.364l0,0l1.948-0.963l-0.043-0.075c0,0,0,0,0,0L16.244,0l-0.801,2.368 c-3.005-1.017-6.167-0.43-8.57,1.287l0.256,0.517L7.771,5.472z M24,10V8h-3.988V6h-2v2H14v2h7.016 c-0.289,1.337-1.128,2.577-2.136,3.543c-1.218-1.2-1.275-2.305-1.275-2.489h-2c0,0.45,0.121,2.07,1.678,3.717 c-0.799,0.482-1.573,0.764-2.152,0.764v2c1.106,0,2.477-0.539,3.771-1.44c0.775,0.502,1.722,0.977,2.903,1.385l0.653-1.89 c-0.769-0.266-1.405-0.559-1.95-0.863c1.271-1.3,2.268-2.947,2.542-4.728H24z"/></svg>`;
    const MARKER = '%tr%';

    function hookDOMPurify() {
        if (window.DOMPurify && window.DOMPurify.sanitize) {
            if (!window.DOMPurify.sanitize.patchedForLime) {
                const originalSanitize = window.DOMPurify.sanitize;
                window.DOMPurify.sanitize = function(content, config) {
                    let html = originalSanitize.call(window.DOMPurify, content, config);
                    if (typeof html === 'string' && html.includes(MARKER)) {
                        const idx = html.indexOf(MARKER);
                        const foreign = html.substring(0, idx);
                        const italian = html.substring(idx);
                        html = foreign + '<span class="streaming-hidden" style="display:none;">' + italian + '</span>';
                    }
                    return html;
                };
                window.DOMPurify.sanitize.patchedForLime = true;
            }
        } else {
            setTimeout(hookDOMPurify, 500); 
        }
    }
    hookDOMPurify();

    function processTranslations() {
        const chatBox = document.getElementById('chat-box');
        if (!chatBox) return;

        const wrappers = chatBox.querySelectorAll('.bot-wrapper.msg-complete');
        if (wrappers.length === 0) return;
        
        wrappers.forEach(wrapper => {
            const botMsg = wrapper.querySelector('.bot-msg');
            if (!botMsg) return;
            
            if (wrapper.getAttribute('data-lang-checked') === 'true') {
                if (botMsg.querySelector('.text-foreign')) return; 
                if (!botMsg.innerHTML.includes(MARKER)) return; 
            }

            wrapper.setAttribute('data-lang-checked', 'true'); 

            const bottomBar = botMsg.querySelector('.msg-bottom-bar');
            if (bottomBar) bottomBar.remove();

            const hiddenSpan = botMsg.querySelector('.streaming-hidden');
            if (hiddenSpan) {
                hiddenSpan.outerHTML = hiddenSpan.innerHTML;
            }

            let htmlContent = botMsg.innerHTML;
            
            if (htmlContent.includes(MARKER)) {
                const parts = htmlContent.split(MARKER);
                const foreignText = parts[0].trim(); 
                const italianText = parts.slice(1).join(MARKER).trim(); 

                const foreignDiv = document.createElement('div');
                foreignDiv.className = 'text-foreign';
                foreignDiv.innerHTML = foreignText; 

                const italianDiv = document.createElement('div');
                italianDiv.className = 'text-italian';
                italianDiv.innerHTML = italianText;

                botMsg.innerHTML = '';
                botMsg.insertAdjacentHTML('beforeend', `<div class="translation-backdrop"></div>`);
                botMsg.appendChild(foreignDiv);
                botMsg.appendChild(italianDiv);
                
                if (bottomBar) {
                    botMsg.appendChild(bottomBar);
                }
                
                botMsg.insertAdjacentHTML('beforeend', `<button class="translate-btn action-btn" title="Tieni premuto per tradurre">${SVG_ICON}</button>`);

            } else {
                if (bottomBar) botMsg.appendChild(bottomBar);
            }
        });
    }

    let activeBotMsg = null;
    let activeBtn = null;

    const chatBox = document.getElementById('chat-box');
    if (chatBox) {
        
        chatBox.addEventListener('pointerdown', (e) => {
            const btn = e.target.closest('.translate-btn');
            if (!btn) return;
            
            e.stopPropagation();
            
            if (e.pointerId && btn.setPointerCapture) {
                btn.setPointerCapture(e.pointerId);
            }

            activeBotMsg = btn.closest('.bot-msg');
            activeBtn = btn;

            if (activeBotMsg) {
                activeBotMsg.classList.add('is-translating');
                activeBotMsg.classList.add('is-inflated');
                btn.classList.add('active');
                
                setTimeout(() => { if (window.syncAnchoring) window.syncAnchoring(); }, 10);
            }
        });

        const releasePointer = (e) => {
            if (!activeBotMsg || !activeBtn) return;
            
            if (activeBotMsg.classList.contains('is-inflated')) {
                activeBotMsg.classList.remove('is-inflated');
                activeBtn.classList.remove('active');
                
                const backdrop = activeBotMsg.querySelector('.translation-backdrop');
                if (backdrop) {
                    if (activeBotMsg.onDeflateEnd) {
                        backdrop.removeEventListener('transitionend', activeBotMsg.onDeflateEnd);
                    }
                    
                    const currentBotMsg = activeBotMsg;
                    currentBotMsg.onDeflateEnd = (evt) => {
                        if (evt.propertyName === 'transform' && !currentBotMsg.classList.contains('is-inflated')) {
                            currentBotMsg.classList.remove('is-translating');
                            setTimeout(() => { if (window.syncAnchoring) window.syncAnchoring(); }, 10);
                            backdrop.removeEventListener('transitionend', currentBotMsg.onDeflateEnd);
                        }
                    };
                    backdrop.addEventListener('transitionend', currentBotMsg.onDeflateEnd);

                    if (backdrop.getBoundingClientRect().width <= 1) {
                        activeBotMsg.classList.remove('is-translating');
                    }
                }
            }
            
            if (e && e.pointerId && activeBtn.hasPointerCapture && activeBtn.hasPointerCapture(e.pointerId)) {
                try { activeBtn.releasePointerCapture(e.pointerId); } catch(err) {}
            }

            activeBotMsg = null;
            activeBtn = null;
        };

        document.addEventListener('pointerup', releasePointer);
        document.addEventListener('pointercancel', releasePointer);
        document.addEventListener('touchend', releasePointer);

        let debounceTimer;
        
        const observer = new MutationObserver((mutations) => {
            let shouldProcess = false;

            mutations.forEach(m => {
                if (m.type === 'attributes' && m.attributeName === 'class' && m.target.classList.contains('msg-complete')) {
                    shouldProcess = true;
                }
                if (m.type === 'childList') {
                    const wrapper = m.target.closest('.bot-wrapper.msg-complete');
                    if (wrapper) shouldProcess = true;
                }
            });

            if (shouldProcess) {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(processTranslations, 100); 
            }
        });
        
        observer.observe(chatBox, { subtree: true, attributes: true, attributeFilter: ['class'], childList: true });
    }

    setTimeout(processTranslations, 500);
})();
</script>

      const originalUpdateProfile = window.updateProfileUI;
      window.updateProfileUI = async function(user) {
          if (originalUpdateProfile) originalUpdateProfile(user);
          
          if (user && user.user_metadata && !user.user_metadata.starter_chats_injected) {
              const starterRows = Object.keys(LIME_STARTER_PACK).map(fakeId => ({
                  user_id: user.id,
                  title: LIME_STARTER_PACK[fakeId].title,
                  dify_id: fakeId 
              }));
              
              await supabaseClient.from('conversations').insert(starterRows);
              
              if (typeof queueProfileUpdate === 'function') {
                  queueProfileUpdate({ starter_chats_injected: true });
              }
              if (typeof loadHistory === 'function') loadHistory();
          }
      };

      const originalLoadChat = window.loadChat;
      window.loadChat = async function(id) {
          const chatInput = document.getElementById('chat-input') || document.querySelector('.input-area textarea');
          
          if (id && LIME_STARTER_PACK[id]) {
              currentConversationId = id;
              if (window.innerWidth < 768 && !DOM.sidebar.classList.contains('hidden')) toggleSidebar();
              
              chatCache[id] = LIME_STARTER_PACK[id].msgs;
              if (typeof renderMessages === 'function') renderMessages(chatCache[id]);

                  chatInput.setAttribute('placeholder', "chat d'esempio");

<script>
           (function initTutorialEngine() {
        let currentIndex = -1;
        
        // Struttura con la prima sequenza ora ancorata alla mascotte

            { selector: '.menu-toggle', text: "Da qui puoi anche gestire le impostazioni, personalizzando il tuo profilo, l’interfaccia e lo sfondo", clearPrevious: false },
            
            // Sequenza greeting
            { selector: '#lime-greeting-box', text: "Questi sono i comandi rapidi. Se non sai come rompere il ghiaccio, clicca un’opzione e iniziamo una chat preimpostata.", clearPrevious: true },
            
            // Sequenza promptbar
            { selector: '.input-wrapper', text: "Ma per un'esperienza più personalizzata, puoi sempre iniziare a scrivere nella barra di testo qui sotto, oppure parlarmi direttamente usando il microfono", clearPrevious: true },

            // Sequenza form
            { selector: 'center', text: "Prima di iniziare, conosciamoci meglio. Che classe frequenti e in quale istituto?", clearPrevious: true, isForm: true },
            
            // Sequenza saluto finale
            { selector: 'center', text: "Perfetto, piacere di conoscerti, [nome_utente]. Buono studio!", clearPrevious: true, isGreeting: true }
        ];

        function updateHighlights() {
            tutorialSteps.forEach(step => {
                if (step.selector !== 'center') {
                    const el = document.querySelector(step.selector);
                    if (el) el.classList.remove('tutorial-elevated-container');
                }

            if (currentIndex >= 0 && currentIndex < tutorialSteps.length) {
                const step = tutorialSteps[currentIndex];
                if (step.selector !== 'center') {
                    const activeContainer = document.querySelector(step.selector);
                    if (activeContainer) activeContainer.classList.add('tutorial-elevated-container');

            }
        }

        function repositionContainer(index) {
            const container = document.getElementById('tutorial-speech-container');
            
            // 1. Reset larghezza di base per tutti gli step normali
            container.style.width = '';
            
            // 2. Modifica chirurgica: se è lo step del greeting, lo allarghiamo del 50%
            if (index >= 0 && tutorialSteps[index].selector === '#lime-greeting-box') {
                container.style.width = (window.innerWidth <= 768 ? 220 * 1.5 : 260 * 1.5) + 'px';
            }

            // 3. Ricalcoliamo altezza e larghezza REALI dopo l'eventuale modifica
            const bWidth = container.offsetWidth;
            const bHeight = container.offsetHeight;

            if (index >= 0 && tutorialSteps[index].selector === 'center') {
                container.classList.add('center-mode');
                container.style.top = (window.innerHeight / 2 - bHeight / 2) + 'px';
                container.style.left = (window.innerWidth / 2 - bWidth / 2) + 'px';
            } else if (index >= 0 && tutorialSteps[index].selector === '#lime-greeting-box') { 
                container.classList.add('center-mode');
                const greeting = document.querySelector('#lime-greeting-box');
                if (greeting) {
                    const gRect = greeting.getBoundingClientRect();
                    container.style.top = (gRect.top - bHeight - 15) + 'px';
                    container.style.left = (window.innerWidth / 2 - bWidth / 2) + 'px';
                }
            } else { 
                container.classList.remove('center-mode');
                const mascot = document.querySelector('#lime-app-mascot');
                if (mascot) {
                    const mRect = mascot.getBoundingClientRect();
                    container.style.top = (mRect.top + (mRect.height / 2) - bHeight + 25) + 'px';
                    if (window.innerWidth <= 768) container.style.left = (mRect.right - 20) + 'px'; 
                    else container.style.left = (mRect.right + 15) + 'px'; 
                }
            }
        }

        function updateSpeechBubble(text, index) {
            const container = document.getElementById('tutorial-speech-container');
            if (index === -1 || (index >= 0 && tutorialSteps[index].clearPrevious)) container.innerHTML = '';
            
            const msgNode = document.createElement('div');
            msgNode.className = 'tut-bubble-msg';
            msgNode.style.pointerEvents = 'auto'; 
            
            let displayText = text;
            if (index >= 0 && tutorialSteps[index].isGreeting) {
                let userName = document.getElementById('settings-user-name')?.innerText || "";
                if (userName === "Nome Utente" || userName === "?") userName = "";
                
                if (userName) {
                    displayText = text.replace('[nome_utente]', userName);
                } else {
                    displayText = text.replace(', [nome_utente]', '');
                }
            }
            
            if (index >= 0 && tutorialSteps[index].isForm) {
                msgNode.innerHTML = `
                    <p style="margin: 0 0 5px 0;">${displayText}</p>
                    <div class="tut-select-group">
                        <select id="tut-edu-level" onchange="window.checkTutorialForm()">
                            <option value="" disabled selected>Classe frequentata...</option>
                            <option value="1">1ª Superiore</option>
                            <option value="2">2ª Superiore</option>
                            <option value="3">3ª Superiore</option>
                            <option value="4">4ª Superiore</option>
                            <option value="5">5ª Superiore</option>
                        </select>
                        <select id="tut-inst-type" onchange="window.checkTutorialForm()">
                            <option value="" disabled selected>Tipo di istituto...</option>
                            <option value="Liceo">Liceo</option>
                            <option value="Tecnico">Tecnico</option>
                            <option value="Professionale">Professionale</option>
                        </select>
                    </div>
                `;
            } else {
                msgNode.innerText = displayText;
            }
            
            container.appendChild(msgNode);
            setTimeout(() => repositionContainer(index), 0);
        }

        window.checkTutorialForm = function() {
            const edu = document.getElementById('tut-edu-level')?.value;
            const inst = document.getElementById('tut-inst-type')?.value;
            const btn = document.getElementById('tutorial-next-btn');
            
            if (edu && inst) {
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
                
                localStorage.setItem('lime_edu_level', edu);
                localStorage.setItem('lime_inst_type', inst);
                if (typeof queueProfileUpdate === 'function') queueProfileUpdate({ lime_edu_level: edu, lime_inst_type: inst });
                
                const sidebarEdu = document.getElementById('edu-dropdown');
                const sidebarInst = document.getElementById('inst-dropdown');
                if (sidebarEdu) sidebarEdu.value = edu;
                if (sidebarInst) sidebarInst.value = inst;
                
            } else {
                btn.style.opacity = '0.5';
                btn.style.pointerEvents = 'none';
            }
        };

        window.nextTutorialStep = function() {
            const btn = document.getElementById('tutorial-next-btn');

            if (document.body.classList.contains('tutorial-sleeping')) {
                document.body.classList.remove('tutorial-sleeping');
                document.body.classList.add('tutorial-waking-up');
                
                btn.style.opacity = '0.5';
                btn.style.pointerEvents = 'none';
                
                setTimeout(() => {
                    document.body.classList.remove('tutorial-waking-up');
                    document.body.classList.add('tutorial-smiling');
                    
                    const container = document.getElementById('tutorial-speech-container');
                    container.style.transition = 'none';
                    
                    currentIndex = 0;
                    updateHighlights();
                    updateSpeechBubble(tutorialSteps[currentIndex].text, currentIndex);
                    
                    setTimeout(() => container.style.transition = '', 50);
                    
                    btn.innerText = "Avanti";
                    btn.style.opacity = '1';
                    btn.style.pointerEvents = 'auto';

                    setTimeout(() => {
                        document.body.classList.remove('tutorial-smiling');
                    }, 2000);

                }, 1300);
                
                return; 
            }

            currentIndex++;
            if (currentIndex >= tutorialSteps.length) { closeTutorial(); return; }

            updateHighlights();
            updateSpeechBubble(tutorialSteps[currentIndex].text, currentIndex);

            if (tutorialSteps[currentIndex].isForm) {
                btn.innerText = "Avanti"; 
                window.checkTutorialForm(); 
            } else if (tutorialSteps[currentIndex].isGreeting) {
                document.body.classList.add('tutorial-smiling');
                btn.innerText = "Inizia!";
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            } else {
                btn.innerText = "Avanti";
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }
            
            if (tutorialSteps[currentIndex].selector === '.input-wrapper') {
                if (typeof window.syncAnchoring === 'function') window.syncAnchoring();
            }
        };

        function closeTutorial() {
            document.body.classList.remove('tutorial-active', 'tutorial-sleeping', 'tutorial-waking-up', 'tutorial-smiling');
            document.getElementById('tutorial-next-btn').style.display = 'none';
            window.removeEventListener('resize', handleResize);
            document.getElementById('tutorial-speech-container').innerHTML = '';
            
            currentIndex = -1;
            updateHighlights(); 
            if (typeof queueProfileUpdate === 'function') queueProfileUpdate({ tutorial_done: true });
        };

        function handleResize() {
            if (document.body.classList.contains('tutorial-active') && !document.body.classList.contains('tutorial-sleeping')) {
                const container = document.getElementById('tutorial-speech-container');
                container.style.transition = 'none'; 
                repositionContainer(currentIndex);
                setTimeout(() => container.style.transition = '', 50);
            }
        }

        window.startTutorial = function() {
            if (document.body.classList.contains('tutorial-active')) return;

            currentIndex = -1; 
            if (typeof queueProfileUpdate === 'function') queueProfileUpdate({ tutorial_done: false });
            
            const container = document.getElementById('tutorial-speech-container');
            const btn = document.getElementById('tutorial-next-btn');
            container.style.transition = 'none';
            container.innerHTML = ''; 
            
            updateHighlights();
            
            document.body.classList.add('tutorial-active', 'tutorial-sleeping');
            
            btn.style.display = 'none';
            btn.style.opacity = '1';
            btn.style.pointerEvents = 'auto';
            
            window.addEventListener('resize', handleResize);
            
            setTimeout(() => {
                btn.innerText = "Inizia";
                btn.style.display = 'flex';
            }, 3000);
        };

        const colorPicker = document.getElementById('color-picker');
        if (colorPicker && !document.getElementById('debug-tut-btn')) {
            const btn = document.createElement('button');
            btn.id = 'debug-tut-btn';
            btn.className = 'debug-tutorial-btn';
            btn.innerText = 'DEBUG: Start Tutorial';
            btn.onclick = window.startTutorial;
            colorPicker.parentNode.appendChild(btn);
        }

        const originalUpdateProfileUI = window.updateProfileUI;
        window.updateProfileUI = function(user) {
            if (originalUpdateProfileUI) originalUpdateProfileUI(user);
            
            if (user) {
                const md = user.user_metadata || {};
                if (md.tutorial_done !== true) {
                    setTimeout(window.startTutorial, 200);
                }
            }
        };
    })();

</script>

<script>


(function injectSmileEyes() {
        const eyesGroup = document.getElementById('lime-eyes-group');
        if (eyesGroup && !document.querySelector('.lime-eye-smile')) {
            const pathD = "M49 56.89l-.15-.2l-.43-.55l-.53-.57c-.22-.25-.48-.49-.73-.75s-.56-.51-.84-.72c-.26-.2-.54-.39-.84-.54c-.2-.11-.42-.2-.65-.25a.739.739 0 0 0-.21 0H44.45h.27h-.55c-.15 0-.05 0 0 0h.08c.08 0 0 0 0 0h-.11c-.23.05-.45.13-.66.25c-.29.16-.58.34-.84.54c-.29.22-.57.46-.83.72c-.53.51-1 1-1.3 1.39l-.52.6l-.23.27a4.231 4.231 0 0 1-5.62.61a3.54 3.54 0 0 1-1.47-3.48s.07-.4.26-1.11c.3-1.01.72-1.99 1.25-2.91c.85-1.5 2-2.81 3.38-3.85c.91-.7 1.92-1.26 3-1.65c.3-.12.61-.21.92-.29c.33-.1.66-.17 1-.23l.61-.09l.51-.06h1.85c.34 0 .67.09 1 .14c.64.11 1.28.28 1.89.51c1.08.39 2.09.95 3 1.65c1.38 1.04 2.53 2.35 3.38 3.85c.31.52.58 1.07.8 1.63c.19.45.35.9.48 1.37c.07.24.13.48.16.72v.25c.3 2.04-1.12 3.94-3.16 4.24c-.05.01-.1.01-.15.02c-1.46.21-2.92-.37-3.85-1.51z";
            
            const createSmile = (x, cx) => {
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute("class", "lime-eye-shape lime-eye-smile");
                
                // overflow: visible per non mozzare l'arco ai lati
                svg.setAttribute("style", `transform-origin: ${cx}px 175px; overflow: visible;`);
                
                // Dimensioni e posizioni ancorate al punto focale dell'occhio nativo
                svg.setAttribute("x", x);
                svg.setAttribute("y", "165");
                svg.setAttribute("width", "20");
                svg.setAttribute("height", "20");
                
                // ViewBox riallineato: la coordinata X a 37 e la Y a 44.5 centrano il path perfetto!
                svg.setAttribute("viewBox", "37 44.5 17 17"); 
                svg.innerHTML = `<path fill="#1a1a1a" d="${pathD}" />`;
                return svg;
            };

            // Iniettiamo rispettando la simmetria assoluta
            eyesGroup.appendChild(createSmile("55", 65));
            eyesGroup.appendChild(createSmile("125", 135));
        }
    })();

    (function initTutorialAnimations() {
        // ---- INIEZIONE "Z" POSIZIONATE A META' CORPO ----
        const mascot = document.querySelector('#lime-app-mascot');
        if (mascot && !document.getElementById('tutorial-zzz-container')) {
            const zDiv = document.createElement('div');
            zDiv.id = 'tutorial-zzz-container';
            zDiv.innerHTML = '<div class="tut-z">z</div><div class="tut-z">z</div><div class="tut-z">z</div>';
            document.body.appendChild(zDiv);

            function syncZzz() {
                if (document.body.classList.contains('tutorial-sleeping')) {
                    const rect = mascot.getBoundingClientRect();
                    zDiv.style.top = (rect.top + (rect.height / 2) - 30) + 'px';
                    zDiv.style.left = (rect.right - 20) + 'px';
                    requestAnimationFrame(syncZzz);
                }
            }

            const sleepObserver = new MutationObserver(() => {
                if (document.body.classList.contains('tutorial-sleeping')) syncZzz();
            });
            sleepObserver.observe(document.body, { attributes: true, attributeFilter: ['class'] });
        }
        // ---------------------------------------------------

        const MAX_EYE_MOVEMENT = 16; 
        const CONVERGENCE_PX = 7;    

        function applyGazeToTarget() {
            const eyes = document.querySelectorAll('.lime-eye');
            if (eyes.length < 2) return; 

            // Spegne il calcolo durante sonno, risveglio e sorriso
            if (!document.body.classList.contains('tutorial-active') || 
                document.body.classList.contains('tutorial-sleeping') ||
                document.body.classList.contains('tutorial-waking-up') ||
                document.body.classList.contains('tutorial-smiling')) {
                eyes.forEach(e => {
                    e.classList.remove('tutorial-gaze-lock');
                    e.style.removeProperty('--tut-converge');
                });
                return;
            }

            eyes.forEach(e => e.classList.add('tutorial-gaze-lock'));

            const activeTarget = document.querySelector('.tutorial-elevated-container');

            if (!mascot || !activeTarget) {
                eyes.forEach(e => {
                    e.style.setProperty('--tut-lx', '0px');
                    e.style.setProperty('--tut-ly', '0px');
                    e.style.setProperty('--tut-converge', '0px');
                });
                return;
            }

            eyes[0].style.setProperty('--tut-converge', `${CONVERGENCE_PX}px`);
            eyes[1].style.setProperty('--tut-converge', `-${CONVERGENCE_PX}px`);

            const mRect = mascot.getBoundingClientRect();
            const tRect = activeTarget.getBoundingClientRect();

            const mCenterX = mRect.left + (mRect.width / 2);
            const mCenterY = mRect.top + (mRect.height / 2);
            const tCenterX = tRect.left + (tRect.width / 2);
            const tCenterY = tRect.top + (tRect.height / 2);

            const dx = tCenterX - mCenterX;
            const dy = tCenterY - mCenterY;
            const distance = Math.sqrt((dx * dx) + (dy * dy));

            let moveX = 0;
            let moveY = 0;

            if (distance > 0) {
                moveX = (dx / distance) * MAX_EYE_MOVEMENT;
                moveY = (dy / distance) * MAX_EYE_MOVEMENT;
            }

            eyes.forEach(e => {
                e.style.setProperty('--tut-lx', moveX + 'px');
                e.style.setProperty('--tut-ly', moveY + 'px');
            });
        }

        const observer = new MutationObserver((mutations) => {
            let shouldUpdate = false;
            mutations.forEach(m => {
                if (m.attributeName === 'class') {
                    const target = m.target;
                    if (target === document.body || 
                        target.classList.contains('tutorial-elevated-container') || 
                        (m.oldValue && m.oldValue.includes('tutorial-elevated-container'))) {
                        shouldUpdate = true;
                    }
                }
            });
            if (shouldUpdate) setTimeout(applyGazeToTarget, 50); 
        });

        observer.observe(document.body, { attributes: true, subtree: true, attributeOldValue: true, attributeFilter: ['class'] });
        
        window.addEventListener('resize', () => {
            if (document.body.classList.contains('tutorial-active') && 
                !document.body.classList.contains('tutorial-sleeping') &&
                !document.body.classList.contains('tutorial-waking-up') &&
                !document.body.classList.contains('tutorial-smiling')) {
                applyGazeToTarget();
            }
        });
    })();
</script>

    const originalHandleFileSelect = window.handleFileSelect;

    window.handleFileSelect = function(e) {
        const file = e.target.files[0];
        if (!file) { clearAttachment(); return; }

        if (file.type.startsWith('image/')) {
            tempFile = file;
            const url = URL.createObjectURL(file);
            preview.onload = () => {
                // Resetta il ritaglio al massimo
                cropState = { x: 0, y: 0, w: 100, h: 100 };
                cropBox.style.display = 'block';
                
                overlay.style.display = 'flex';
                setTimeout(() => { overlay.style.opacity = '1'; }, 10);
                setTimeout(updateImgRect, 50); 
            };
            preview.src = url;
            e.target.value = ''; 
        } else {
            originalHandleFileSelect({ target: { files: [file] } });
        }
    };

    function updateImgRect() {
        const cRect = container.getBoundingClientRect();
        const ratio = Math.min(cRect.width / preview.naturalWidth, cRect.height / preview.naturalHeight);
        imgRect.width = preview.naturalWidth * ratio;
        imgRect.height = preview.naturalHeight * ratio;
        imgRect.left = (cRect.width - imgRect.width) / 2;
        imgRect.top = (cRect.height - imgRect.height) / 2;
        imgRect.natW = preview.naturalWidth;
        imgRect.natH = preview.naturalHeight;
        updateCropBoxDOM();
    }

    function updateCropBoxDOM() {
        cropBox.style.left = (imgRect.left + (cropState.x / 100) * imgRect.width) + 'px';
        cropBox.style.top = (imgRect.top + (cropState.y / 100) * imgRect.height) + 'px';
        cropBox.style.width = ((cropState.w / 100) * imgRect.width) + 'px';
        cropBox.style.height = ((cropState.h / 100) * imgRect.height) + 'px';
    }

    function closeOverlay() {
        overlay.style.opacity = '0';
        setTimeout(() => { overlay.style.display = 'none'; }, 200);
    }

    // 3. Azioni dei bottoni
    document.getElementById('lime-btn-riprova').onclick = () => {
        closeOverlay();
        DOM.fileInput.click(); 
    };

    // Tasto Ruota: ruota fisicamente il file a sinistra e ricarica
    document.getElementById('lime-btn-ruota').onclick = () => {
        const btnRuota = document.getElementById('lime-btn-ruota');
        btnRuota.style.opacity = '0.5';
        btnRuota.style.pointerEvents = 'none';

        const img = new Image();
        img.onload = async () => {
            const canvas = document.createElement('canvas');
            // Invertiamo altezza e larghezza per la rotazione di 90 gradi
            canvas.width = img.height;
            canvas.height = img.width;
            const ctx = canvas.getContext('2d');
            
            // Logica di rotazione antioraria (-90 gradi)
            ctx.translate(0, canvas.height);
            ctx.rotate(-Math.PI / 2);
            ctx.drawImage(img, 0, 0);

            const blob = await new Promise(res => canvas.toBlob(res, tempFile.type || 'image/jpeg', 0.9));
            tempFile = new File([blob], tempFile.name || 'rotated.jpg', { type: tempFile.type || 'image/jpeg' });
            
            // Ricarica nel preview (questo scatenerà preview.onload resettando la griglia perfettamente)
            preview.src = URL.createObjectURL(tempFile);
            
            btnRuota.style.opacity = '1';
            btnRuota.style.pointerEvents = 'auto';
        };
        img.src = URL.createObjectURL(tempFile);
    };

    document.getElementById('lime-btn-conferma').onclick = async () => {
        const btnConf = document.getElementById('lime-btn-conferma');
        btnConf.style.opacity = '0.5';
        btnConf.style.pointerEvents = 'none';
        
        let finalFile = tempFile;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const sx = (cropState.x / 100) * imgRect.natW, sy = (cropState.y / 100) * imgRect.natH;
        const sw = (cropState.w / 100) * imgRect.natW, sh = (cropState.h / 100) * imgRect.natH;
        
        canvas.width = sw; canvas.height = sh;
        ctx.drawImage(preview, sx, sy, sw, sh, 0, 0, sw, sh);
        
        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
        finalFile = new File([blob], tempFile.name || 'ritaglio.jpg', { type: 'image/jpeg' });

        closeOverlay();
        btnConf.style.opacity = '1';
        btnConf.style.pointerEvents = 'auto';
        
        originalHandleFileSelect({ target: { files: [finalFile] } });
    };

    // 4. Logica Touch & Mouse
    let startTouch = null, startCrop = null;

    const dragStart = (x, y, target) => {
        startTouch = { x, y }; startCrop = { ...cropState };
        activeHandle = target.classList.contains('crop-handle') ? target.classList[1] : 'move';
    };

    const dragMove = (x, y) => {
        if (!startTouch) return;
        const dx = ((x - startTouch.x) / imgRect.width) * 100, dy = ((y - startTouch.y) / imgRect.height) * 100;
        let nx = startCrop.x, ny = startCrop.y, nw = startCrop.w, nh = startCrop.h;

        if (activeHandle === 'move') { nx += dx; ny += dy; } else {
            if (activeHandle.includes('left')) { nx += dx; nw -= dx; }
            if (activeHandle.includes('right')) { nw += dx; }
            if (activeHandle.includes('top')) { ny += dy; nh -= dy; }
            if (activeHandle.includes('bottom')) { nh += dy; }
        }

        if (nw < 15) nw = 15; if (nh < 15) nh = 15;
        if (nx < 0) nx = 0; if (ny < 0) ny = 0;
        if (nx + nw > 100) { if(activeHandle==='move') nx = 100 - nw; else nw = 100 - nx; }
        if (ny + nh > 100) { if(activeHandle==='move') ny = 100 - nh; else nh = 100 - ny; }

        cropState = { x: nx, y: ny, w: nw, h: nh };
        updateCropBoxDOM();
    };

    cropBox.addEventListener('touchstart', (e) => { e.preventDefault(); dragStart(e.touches[0].clientX, e.touches[0].clientY, e.target); }, { passive: false });
    cropBox.addEventListener('touchmove', (e) => { e.preventDefault(); dragMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    cropBox.addEventListener('touchend', () => { startTouch = null; activeHandle = null; });
    
    cropBox.addEventListener('mousedown', (e) => {
        e.preventDefault(); dragStart(e.clientX, e.clientY, e.target);
        const onMouseMove = (ev) => dragMove(ev.clientX, ev.clientY);
        const onMouseUp = () => { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); startTouch = null; };
        document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
    });
})();

    
</script>

            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        };
        attachBtn.parentNode.insertBefore(trashBtn, timer);
    }

    // 2. Override: toggleRecording (Gestisce colore, timer e cestino)
    window.toggleRecording = async function() { 
        if (isRecording) { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); return; } 
        try { 
            if (DOM.greetingBox) DOM.greetingBox.classList.add('hidden-greeting');

            if (!globalStream) globalStream = await navigator.mediaDevices.getUserMedia({ audio: true }); globalStream.getAudioTracks().forEach(t => t.enabled = true); 
            mediaRecorder = new MediaRecorder(globalStream); audioChunks = []; 
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); }; 
            mediaRecorder.onstop = async () => { 
                isRecording = false; clearInterval(recordingTimer); globalStream.getAudioTracks().forEach(t => t.enabled = false); 
                DOM.timerDisplay.classList.add('hidden'); 
                if (DOM.micBtn) DOM.micBtn.classList.add('hidden'); 
                
                const cancelBtn = document.getElementById('cancel-record-btn');
                if (cancelBtn) cancelBtn.style.display = 'none';
                
                DOM.sendBtn.innerHTML = SVG_ICONS.sendPlane; 
                DOM.sendBtn.style.background = 'var(--accent)'; 
                DOM.sendBtn.style.color = 'inherit';
                DOM.sendBtn.disabled = true; 
                
                if (window.isRecordingCancelled) { 
                    resetInputUI(); 
                    return; 
                }
                
                if (audioChunks.length > 0) { 
                    if (window.setMascotThinking) window.setMascotThinking(true); 
                    try { 
                        const rawBlob = new Blob(audioChunks); 
                        const wavBlob = await encodeToWAV(rawBlob); 
                        await sendWavToDify(new File([wavBlob], 'audio.wav', { type: 'audio/wav' })); 
                    } catch (e) { alert("Errore conversione."); resetInputUI(); } 
                } else {
                    resetInputUI(); 
                }
            }; 
            mediaRecorder.start(); isRecording = true; 
            
            if (DOM.attachBtn) DOM.attachBtn.classList.add('hidden'); 
            if (DOM.micBtn) DOM.micBtn.classList.add('hidden'); 
            DOM.timerDisplay.classList.remove('hidden'); 
            
            DOM.inputField.disabled = true; 
            DOM.inputField.style.color = 'transparent'; // Nasconde il testo di input in modo invisibile
            DOM.inputField.placeholder = ""; 
            DOM.inputField.value = ""; 
            
            window.isRecordingCancelled = false;
            const cancelBtn = document.getElementById('cancel-record-btn');
            if (cancelBtn) cancelBtn.style.display = 'flex';
            
            recordingSeconds = 0; 
            DOM.timerDisplay.innerText = `00:00`; 
            recordingTimer = setInterval(() => { 
                recordingSeconds++; 
                DOM.timerDisplay.innerText = `${String(Math.floor(recordingSeconds / 60)).padStart(2, '0')}:${String(recordingSeconds % 60).padStart(2, '0')}`; 
            }, 1000); 
            
            DOM.sendBtn.innerText = '■'; 
            DOM.sendBtn.style.background = 'var(--accent)'; 
            DOM.sendBtn.style.color = '#000';
            DOM.sendBtn.onclick = () => { if (mediaRecorder.state !== 'inactive') mediaRecorder.stop(); }; 
        } catch (err) { alert("Microfono negato."); } 
    };

    // 3. Override: resetInputUI (Ripristino grafico e funzionale)
    window.resetInputUI = function(clearText = true) { 
        if (window.setMascotThinking) window.setMascotThinking(false); 
        DOM.inputField.disabled = false; 
        DOM.inputField.style.color = 'inherit'; 
        if (clearText) DOM.inputField.value = ''; 
        DOM.inputField.placeholder = "Scrivi a LIME..."; 
        
        DOM.sendBtn.innerHTML = SVG_ICONS.sendPlane; 
        DOM.sendBtn.style.background = 'var(--accent)'; 
        DOM.sendBtn.style.color = 'inherit';
        DOM.sendBtn.disabled = false; 
        DOM.sendBtn.onclick = sendMessage; // Riaggancia correttamente il click dopo la registrazione
        
        if (DOM.micBtn && DOM.inputField.value.trim().length === 0 && !isGenerating) DOM.micBtn.classList.remove('hidden'); 
        if (DOM.attachBtn) DOM.attachBtn.classList.remove('hidden'); 
        if (DOM.timerDisplay) DOM.timerDisplay.classList.add('hidden'); 
        
        const cancelBtn = document.getElementById('cancel-record-btn');
        if (cancelBtn) cancelBtn.style.display = 'none';
        
        clearInterval(recordingTimer); 
    };

    // 4. Override: sendWavToDify (Alza la bandierina per bloccare la tastiera)
    window.sendWavToDify = async function(audioFile) { 
        const formData = new FormData(); formData.append('file', audioFile); formData.append('user', userId); 
        try { 
            const res = await fetch(`${EDGE_FUNCTION_URL}?path=/audio-to-text`, { method: 'POST', headers: await getAuthHeaders(), body: formData }); 
            const data = await res.json(); 
            if (res.ok && data.text) { 
                DOM.inputField.style.color = 'inherit'; 
                DOM.inputField.value = data.text; 
                resetInputUI(false); 
                DOM.sendBtn.disabled = false; 
                
                // LA BANDIERINA CHIAVE
                window.sentViaMic = true; 
                sendMessage(); 
            } else { 
                resetInputUI(); 
            } 
        } catch (e) { resetInputUI(); } 
    };

    // 5. Blocco Tastiera: Intercettiamo la funzione focus() originale
    const originalFocus = HTMLTextAreaElement.prototype.focus;
    HTMLTextAreaElement.prototype.focus = function() {
        if (window.sentViaMic && this.id === 'user-input') {
            window.sentViaMic = false; // Abbassa la bandierina
            return; // Uccide l'azione, la tastiera non si aprirà
        }
        originalFocus.apply(this, arguments);
    };

})();
